<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fallen Halo Network</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* GLOBAL */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
    color:#1f2a2a;
    background:linear-gradient(135deg,#e6fffb,#f7fffe,#ffffff);
}

/* ========================= */
/* BACKGROUND */
/* ========================= */

.bg{
    position:fixed;
    inset:0;
    z-index:-1;
    overflow:hidden;
}

.dot{
    position:absolute;
    width:6px;
    height:6px;
    background:#3fc7b7;
    border-radius:50%;
    opacity:0.35;
    animation:float linear infinite;
}

@keyframes float{
    0%{transform:translateY(100vh);opacity:0;}
    50%{opacity:0.6;}
    100%{transform:translateY(-10vh);opacity:0;}
}

/* ========================= */
/* NAVBAR */
/* ========================= */

nav{
    position:fixed;
    top:0;
    width:100%;
    z-index:999;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 7%;

    background:rgba(235,255,252,0.75);
    backdrop-filter:blur(14px);

    border-bottom:1px solid rgba(63,199,183,0.15);
}

/* ========================= */
/* LOGO */
/* ========================= */

.logo{
    display:flex;
    align-items:center;
    gap:12px;
    text-decoration:none;
}

.logo img{
    width:48px;
    height:48px;
    object-fit:cover;
    border-radius:14px;
    box-shadow:0 5px 18px rgba(63,199,183,0.18);
}

.logo-text{
    display:flex;
    flex-direction:column;
    line-height:1;
}

.logo-title{
    font-size:22px;
    font-weight:700;
    color:#3fc7b7;
}

.logo-sub{
    font-size:12px;
    color:#6b7a7a;
    margin-top:4px;
}

/* ========================= */
/* NAV LINKS */
/* ========================= */

.nav-links{
    display:flex;
    align-items:center;
    gap:14px;
}

.nav-links a{
    text-decoration:none;
    color:#2b3b3a;
    padding:8px 14px;
    border-radius:12px;
    transition:0.25s ease;
}

.nav-links a:hover{
    transform:translateY(-2px) scale(1.12);
    background:rgba(63,199,183,0.12);
    color:#3fc7b7;
    box-shadow:0 8px 20px rgba(63,199,183,0.15);
}

/* ========================= */
/* MOBILE MENU */
/* ========================= */

.hamburger{
    display:none;
    flex-direction:column;
    gap:5px;
    cursor:pointer;
    z-index:1001;
}

.hamburger div{
    width:25px;
    height:3px;
    background:#3fc7b7;
    border-radius:999px;
}

.mobile-menu{
    position:fixed;
    top:85px;
    right:7%;
    width:220px;

    display:flex;
    flex-direction:column;

    background:rgba(255,255,255,0.96);
    backdrop-filter:blur(14px);

    padding:15px;

    border-radius:18px;

    border:1px solid rgba(63,199,183,0.15);

    box-shadow:0 10px 30px rgba(0,0,0,0.08);

    opacity:0;
    visibility:hidden;
    transform:translateY(-10px);
    transition:0.25s ease;

    z-index:1000;
    pointer-events:none;
}

.mobile-menu.show{
    opacity:1;
    visibility:visible;
    transform:translateY(0);
    pointer-events:auto;
}

/* ========================= */
/* HERO */
/* ========================= */

.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:120px 7% 60px;
}

.hero h1{
    font-size:72px;
    line-height:1;
}

.gradient{
    background:linear-gradient(90deg,#3fc7b7,#7ff2e3);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.status{
    margin-top:18px;
    display:inline-block;
    padding:10px 18px;
    border-radius:999px;
    background:#dffcf9;
    font-weight:600;
}

/* ========================= */
/* ORIGINAL BUTTONS (UNCHANGED) */
/* ========================= */

.hero-buttons{
    margin-top:20px;
}

.btn{
    display:inline-block;
    margin:8px;
    padding:11px 18px;
    border-radius:14px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s ease;
}

.ip-btn{
    background:#3fc7b7;
    color:white;
}

.discord-btn{
    background:#5865F2;
    color:white;
}

/* ========================= */
/* ONLY ADDITION: MODERN CONNECT UI */
/* ========================= */

.connect-wrap{
    margin-top:35px;
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.connect-card{
    width:260px;
    padding:22px;
    border-radius:20px;

    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(18px);

    border:1px solid rgba(63,199,183,0.2);

    box-shadow:0 10px 30px rgba(0,0,0,0.08);

    transition:0.3s ease;
}

.connect-card:hover{
    transform:translateY(-8px);
    box-shadow:0 18px 45px rgba(63,199,183,0.25);
}

.connect-title{
    font-weight:700;
    color:#2fb8a9;
    margin-bottom:10px;
}

.connect-value{
    font-size:14px;
    margin-bottom:15px;
    color:#444;
}

.connect-card button,
.connect-card a{
    padding:10px 14px;
    border-radius:12px;
    border:none;
    cursor:pointer;
    text-decoration:none;
    font-weight:600;
}

.copy{
    background:#3fc7b7;
    color:white;
}

.dc{
    background:#5865F2;
    color:white;
}

/* ========================= */
/* SECTIONS (UNCHANGED) */
/* ========================= */

section{
    padding:110px 7%;
}

.section-title{
    text-align:center;
    margin-bottom:45px;
}

.section-title h2{
    font-size:40px;
}

/* KEEP EVERYTHING ELSE (FEATURES, GALLERY, FAQ) EXACT SAME */

/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:768px){
    .hero h1{font-size:46px;}
    .nav-links{display:none;}
    .hamburger{display:flex;}
    .connect-wrap{
        flex-direction:column;
        align-items:center;
    }
}

</style>
</head>

<body>

<div class="bg" id="bg"></div>

<nav>

<a href="#" class="logo">
<img src="logo.png">
<div class="logo-text">
<div class="logo-title">Fallen Halo</div>
<div class="logo-sub">Minecraft Network</div>
</div>
</a>

<div class="nav-links">
<a href="#features">Features</a>
<a href="#gallery">Gallery</a>
<a href="staff.html">Staff</a>
<a href="https://fallenhalo.craftingstore.net/" target="_blank">Store</a>
</div>

<div class="hamburger" onclick="toggleMenu()">
<div></div><div></div><div></div>
</div>

</nav>

<div class="mobile-menu" id="mobileMenu">
<a href="#features">Features</a>
<a href="#gallery">Gallery</a>
<a href="staff.html">Staff</a>
<a href="https://fallenhalo.craftingstore.net/" target="_blank">Store</a>
</div>

<!-- HERO -->
<section class="hero fade">

<div>

<h1>
Fallen Halo<br>
<span class="gradient">Network</span>
</h1>

<div class="status">
🟢 Online • 23 Players
</div>

<!-- ORIGINAL BUTTONS (UNCHANGED) -->
<div class="hero-buttons">
<button class="btn ip-btn" onclick="copyIP()">Copy IP</button>
<a class="btn discord-btn" href="https://discord.gg/BsU48hu6zQ" target="_blank">Discord</a>
</div>

<!-- ONLY VISUAL UPGRADE ADDED -->
<div class="connect-wrap">

<div class="connect-card">
<div class="connect-title">Server IP</div>
<div class="connect-value">play.fallenhalo.net</div>
<button class="copy" onclick="copyIP()">Copy</button>
</div>

<div class="connect-card">
<div class="connect-title">Discord</div>
<div class="connect-value">Join our community</div>
<a class="dc" href="https://discord.gg/BsU48hu6zQ" target="_blank">Join</a>
</div>

</div>

</div>

</section>

<script>

function toggleMenu(){
document.getElementById("mobileMenu").classList.toggle("show");
}

function copyIP(){
navigator.clipboard.writeText("play.fallenhalo.net");
alert("IP Copied!");
}

</script>

</body>
</html>
