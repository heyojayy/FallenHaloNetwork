<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fallen Halo Network</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ===================================== */
/* ROOT COLORS */
/* ===================================== */

:root{

    --bg:#0d1016;
    --bg2:#151b28;

    --text:#ffffff;
    --text-soft:#bcc6d8;

    --card:rgba(255,255,255,.05);
    --card-border:rgba(255,255,255,.08);

    --navbar:rgba(10,10,15,.35);

    --gradient1:#e2e6ee;
    --gradient2:#a6b8e4;

    --shadow:rgba(166,184,228,.18);

}

/* LIGHT MODE */

body.light-mode{

    --bg:#eef2f9;
    --bg2:#dce5f7;

    --text:#111827;
    --text-soft:#4b5563;

    --card:rgba(255,255,255,.75);
    --card-border:rgba(0,0,0,.06);

    --navbar:rgba(255,255,255,.55);

    --gradient1:#8ca3dd;
    --gradient2:#5d79be;

    --shadow:rgba(93,121,190,.15);

}

/* smoother gradient transition fix */
body{
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;

    background:linear-gradient(120deg,var(--bg),var(--bg2));
    color:var(--text);

    transition:background .6s ease, color .4s ease;
}

/* ===================================== */
/* NAV FIXED ALIGNMENT */
/* ===================================== */

nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:999;

    backdrop-filter:blur(18px);
    background:var(--navbar);

    border-bottom:1px solid var(--card-border);
}

.nav-container{
    max-width:1300px;
    margin:auto;

    padding:18px 25px;

    display:flex;
    align-items:center;
}

/* FORCE LOGO LEFT */
.logo{
    display:flex;
    align-items:center;
    gap:12px;

    margin-right:auto; /* KEY FIX */
}

.logo img{
    width:48px;
}

/* RIGHT SIDE NAV */
.nav-right{
    display:flex;
    align-items:center;
    gap:18px;
}

.nav-links{
    display:flex;
    align-items:center;
    gap:18px;
}

.nav-links a{
    text-decoration:none;
    color:var(--text);
    font-weight:500;

    padding:8px 12px;
    border-radius:10px;
    transition:.3s;
}

.nav-links a:hover{
    background:var(--card);
}

/* ===================================== */
/* THEME BUTTON */
/* ===================================== */

.theme-toggle{
    width:46px;
    height:46px;

    border-radius:12px;

    border:1px solid var(--card-border);
    background:var(--card);

    cursor:pointer;
    color:var(--text);
}

/* ===================================== */
/* HERO */
/* ===================================== */

.hero{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

/* ===================================== */
/* SECTIONS */
/* ===================================== */

section{
    padding:110px 20px;
}

/* ===================================== */
/* FOOTER FIX (TEXT STYLE CLEAN) */
/* ===================================== */

footer{
    padding:60px 20px;
    border-top:1px solid var(--card-border);

    text-align:center;
    opacity:.95;
}

.footer-links{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:18px;

    margin-bottom:18px;
}

.footer-links a{
    text-decoration:none;
    color:var(--text-soft);
    font-size:14px;

    transition:.3s;
}

.footer-links a:hover{
    color:var(--text);
}

/* ===================================== */
/* YOUR REST STAYS SAME (UNCHANGED BELOW) */
/* ===================================== */

</style>
</head>

<body>

<!-- NAV -->
<nav>
    <div class="nav-container">

        <div class="logo">
            <img src="logo.png">
            <b>Fallen Halo Network</b>
        </div>

        <div class="nav-right">

            <div class="nav-links">
                <a href="#features">Features</a>
                <a href="#gallery">Gallery</a>
                <a href="#faq">FAQ</a>
                <a href="staff.html">Staff</a> <!-- ADDED -->
            </div>

            <button class="theme-toggle" id="themeToggle">☀</button>

        </div>

    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>Fallen Halo Network</h1>
        <p style="color:var(--text-soft)">Minecraft network built different.</p>
    </div>
</section>

<!-- FOOTER -->
<footer>

    <div class="footer-links">
        <a href="#">Discord</a>
        <a href="#">Store</a>
        <a href="#">Vote</a>
        <a href="#">Support</a>
    </div>

    <p style="color:var(--text-soft);font-size:13px;">
        © Fallen Halo Network
    </p>

</footer>

<script>

/* THEME SWITCH */

const btn = document.getElementById("themeToggle");

btn.onclick = () => {
    document.body.classList.toggle("light-mode");
    btn.innerHTML = document.body.classList.contains("light-mode") ? "🌙" : "☀";
};

</script>

</body>
</html>
