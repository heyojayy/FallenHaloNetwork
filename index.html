<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fallen Halo Network</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* GLOBAL */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
    color:#222;

    background:
    radial-gradient(circle at top left,#d7fffb 0%,#ffffff 40%),
    radial-gradient(circle at bottom right,#c8faf5 0%,#ffffff 40%);
}

/* ========================= */
/* NAV */
/* ========================= */

nav{
    position:fixed;
    top:0;
    width:100%;
    z-index:999;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:20px 7%;

    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(14px);

    border-bottom:1px solid rgba(120,230,220,0.15);
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;

    font-size:22px;
    font-weight:700;

    color:#55d2c8;
}

.logo img{
    width:50px;
    height:50px;
    border-radius:16px;
    background:#eee;
}

/* ========================= */
/* HERO */
/* ========================= */

.hero{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;

    gap:60px;

    padding:140px 7% 80px;
}

.hero-left{
    flex:1;
    min-width:300px;
}

.hero-left h1{
    font-size:70px;
    line-height:1;
    margin-bottom:20px;
}

.gradient{
    background:linear-gradient(90deg,#55d2c8,#9ff6ee);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero-left p{
    color:#666;
    font-size:18px;
    line-height:1.8;
    margin-bottom:30px;
    max-width:600px;
}

.btn{
    padding:14px 28px;
    border-radius:14px;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
}

.btn-main{
    background:#55d2c8;
    color:white;
}

.btn-main:hover{
    transform:translateY(-4px);
}

.btn-secondary{
    border:2px solid #55d2c8;
    color:#55d2c8;
}

/* ========================= */
/* SECTIONS */
/* ========================= */

section{
    padding:100px 7%;
}

.section-title{
    text-align:center;
    margin-bottom:60px;
}

.section-title h2{
    font-size:48px;
}

/* ========================= */
/* FEATURES */
/* ========================= */

.features{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.feature{
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(12px);

    padding:30px;
    border-radius:24px;

    border:1px solid rgba(120,230,220,0.15);
}

/* ========================= */
/* GALLERY */
/* ========================= */

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    height:240px;
    object-fit:cover;
    border-radius:24px;
}

/* ========================= */
/* STAFF */
/* ========================= */

.staff-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.staff-card{
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(12px);

    padding:30px;
    border-radius:24px;

    text-align:center;

    border:1px solid rgba(120,230,220,0.15);
}

.staff-card img{
    width:110px;
    height:110px;
    border-radius:18px;
    margin-bottom:15px;
    image-rendering:pixelated;
}

/* ========================= */
/* FAQ - FIXED SMOOTH ROLL */
/* ========================= */

.faq{
    max-width:900px;
    margin:auto;
}

.faq-item{
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(12px);

    border-radius:22px;
    margin-bottom:18px;

    border:1px solid rgba(120,230,220,0.15);

    overflow:hidden;
}

.faq-item summary{
    padding:22px 26px;
    cursor:pointer;

    font-weight:600;
    font-size:18px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    list-style:none;
}

.faq-item summary::-webkit-details-marker{
    display:none;
}

.faq-item summary span{
    font-size:24px;
    color:#55d2c8;
    transition:0.3s;
}

.faq-item[open] summary span{
    transform:rotate(45deg);
}

/* smooth roll */
.faq-content{
    display:grid;
    grid-template-rows:0fr;
    transition:grid-template-rows 0.45s ease;
}

.faq-inner{
    overflow:hidden;
}

.faq-item[open] .faq-content{
    grid-template-rows:1fr;
}

.faq-inner p{
    padding:0 26px 22px;
    color:#666;
    line-height:1.8;

    opacity:0;
    transform:translateY(-10px);
    transition:0.35s ease;
}

.faq-item[open] .faq-inner p{
    opacity:1;
    transform:translateY(0);
}

/* ========================= */
/* FOOTER */
/* ========================= */

footer{
    text-align:center;
    padding:40px;

    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(10px);

    border-top:1px solid rgba(120,230,220,0.15);

    color:#666;
}

/* ========================= */
/* FADE IN (SAFE VERSION) */
/* ========================= */

.fade-in{
    opacity:1; /* IMPORTANT: prevents disappearing bug */
    transform:translateY(0);
    transition:1s ease;
}

.fade-in.show{
    opacity:1;
    transform:translateY(0);
}

.hidden{
    opacity:0;
    transform:translateY(40px);
}

/* ========================= */

</style>
</head>

<body>

<!-- NAV -->
<nav>
    <div class="logo">
        <img src="logo.png">
        Fallen Halo
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <div class="hero-left">
        <h1>Fallen Halo<br><span class="gradient">Network</span></h1>
        <p>Minecraft server with economy, PvP, events and community.</p>

        <a class="btn btn-main" href="#">Play Now</a>
        <a class="btn btn-secondary" href="#">Discord</a>
    </div>
</section>

<!-- FEATURES -->
<section>
    <div class="section-title">
        <h2>Features</h2>
    </div>

    <div class="features">
        <div class="feature">Economy System</div>
        <div class="feature">Custom Events</div>
        <div class="feature">Friendly Community</div>
    </div>
</section>

<!-- GALLERY -->
<section>
    <div class="section-title">
        <h2>Gallery</h2>
    </div>

    <div class="gallery">
        <img src="1.png">
        <img src="2.png">
        <img src="3.png">
    </div>
</section>

<!-- STAFF -->
<section>
    <div class="section-title">
        <h2>Staff Team</h2>
    </div>

    <div class="staff-grid">
        <div class="staff-card">
            <img src="https://mc-heads.net/avatar/Notch">
            <p>Owner</p>
        </div>

        <div class="staff-card">
            <img src="https://mc-heads.net/avatar/Steve">
            <p>Admin</p>
        </div>
    </div>
</section>

<!-- FAQ -->
<section>
    <div class="section-title">
        <h2>FAQ</h2>
    </div>

    <div class="faq">

        <details class="faq-item">
            <summary>What is the IP? <span>+</span></summary>
            <div class="faq-content">
                <div class="faq-inner">
                    <p>play.fallenhalo.net</p>
                </div>
            </div>
        </details>

        <details class="faq-item">
            <summary>Version? <span>+</span></summary>
            <div class="faq-content">
                <div class="faq-inner">
                    <p>1.21+</p>
                </div>
            </div>
        </details>

    </div>
</section>

<!-- FOOTER -->
<footer>
    © 2026 Fallen Halo Network
</footer>

</body>
</html>
