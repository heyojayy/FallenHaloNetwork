<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fallen Halo Network</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* GLOBAL */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
}

body{
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
    color:#1f2a2a;
    background:linear-gradient(135deg,#e6fffb,#f7fffe,#ffffff);
}

/* ========================= */
/* ANIMATED BACKGROUND (FEATURE #4) */
/* ========================= */

.bg{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    z-index:-1;
    overflow:hidden;
}

.dot{
    position:absolute;
    width:6px;
    height:6px;
    background:#3fc7b7;
    border-radius:50%;
    opacity:0.4;
    animation:float 10s linear infinite;
}

@keyframes float{
    0%{transform:translateY(100vh); opacity:0;}
    50%{opacity:0.6;}
    100%{transform:translateY(-10vh); opacity:0;}
}

/* ========================= */
/* NAV */
/* ========================= */

nav{
    position:fixed;
    top:0;
    width:100%;
    z-index:999;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 7%;

    background:rgba(235,255,252,0.75);
    backdrop-filter:blur(14px);
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:700;
    color:#3fc7b7;
}

.logo img{
    width:42px;
    border-radius:12px;
}

/* nav links */
.nav-links a{
    margin-left:18px;
    text-decoration:none;
    color:#2b3b3a;
    padding:8px 12px;
    border-radius:12px;
    display:inline-block;
}

.nav-links a:hover{
    background:rgba(63,199,183,0.12);
    transform:scale(1.1);
}

/* ========================= */
/* HERO */
/* ========================= */

.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:65px;
}

.gradient{
    background:linear-gradient(90deg,#3fc7b7,#7ff2e3);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ========================= */
/* STATUS WIDGET (FEATURE #1) */
/* ========================= */

.status{
    margin-top:20px;
    display:inline-block;
    padding:10px 16px;
    border-radius:999px;
    background:#dffcf9;
    color:#2b3b3a;
    font-weight:600;
}

/* ========================= */
/* BUTTONS */
/* ========================= */

.btn{
    display:inline-block;
    margin:8px;
    padding:10px 16px;
    border-radius:12px;
    background:#3fc7b7;
    color:white;
    text-decoration:none;
    font-weight:600;
}

/* ========================= */
/* SECTIONS */
/* ========================= */

section{
    padding:100px 7%;
}

/* ========================= */
/* FEATURES */
/* ========================= */

.features{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
}

.feature{
    background:rgba(63,199,183,0.08);
    border-radius:24px;
    padding:25px;
    transition:0.3s;
}

.feature:hover{
    transform:scale(1.05);
}

/* ========================= */
/* STORE (FEATURE #5) */
/* ========================= */

.store{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:20px;
    border:1px solid rgba(63,199,183,0.2);
}

.price{
    font-weight:700;
    color:#3fc7b7;
}

/* ========================= */
/* STAFF PREVIEW (FEATURE #6) */
/* ========================= */

.staff{
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

.staff-card{
    text-align:center;
    padding:20px;
    border-radius:20px;
    background:rgba(63,199,183,0.08);
}

.staff-card img{
    width:80px;
    border-radius:16px;
}

/* ========================= */
/* DISCORD BUTTON (FEATURE #7) */
/* ========================= */

.discord{
    display:inline-block;
    margin-top:20px;
    padding:12px 18px;
    background:#5865F2;
    color:white;
    border-radius:12px;
    text-decoration:none;
}

/* ========================= */
/* FADE IN (FEATURE #9) */
/* ========================= */

.fade{
    opacity:0;
    transform:translateY(40px);
    transition:0.8s;
}

.fade.show{
    opacity:1;
    transform:translateY(0);
}

/* ========================= */
/* MOBILE (FEATURE #10) */
/* ========================= */

@media(max-width:768px){
    .hero h1{font-size:38px;}
}

</style>
</head>

<body>

<!-- BACKGROUND (FEATURE #4) -->
<div class="bg" id="bg"></div>

<!-- NAV -->
<nav>
    <div class="logo">
        <img src="https://mc-heads.net/avatar/Steve">
        Fallen Halo
    </div>

    <div class="nav-links">
        <a href="#features">Features</a>
        <a href="#store">Store</a>
        <a href="#staff">Staff</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero fade">
    <div>
        <h1>Fallen Halo<br><span class="gradient">Network</span></h1>

        <!-- SERVER STATUS (FEATURE #1) -->
        <div class="status">🟢 Online • 23 Players</div>

        <!-- COPY IP (FEATURE #8) -->
        <div>
            <button class="btn" onclick="copyIP()">Copy IP</button>
            <a class="discord" href="#">Join Discord</a>
        </div>
    </div>
</section>

<!-- FEATURES -->
<section id="features" class="fade">
    <h2>Features</h2>

    <div class="features">
        <div class="feature">Economy System</div>
        <div class="feature">Custom Events</div>
        <div class="feature">Active Community</div>
    </div>
</section>

<!-- STORE (FEATURE #5) -->
<section id="store" class="fade">
    <h2>Store</h2>

    <div class="store">
        <div class="card">
            <h3>VIP Rank</h3>
            <p class="price">$5</p>
        </div>

        <div class="card">
            <h3>MVP Rank</h3>
            <p class="price">$10</p>
        </div>
    </div>
</section>

<!-- STAFF (FEATURE #6) -->
<section id="staff" class="fade">
    <h2>Staff</h2>

    <div class="staff">
        <div class="staff-card">
            <img src="https://mc-heads.net/avatar/Notch">
            <p>Owner</p>
        </div>

        <div class="staff-card">
            <img src="https://mc-heads.net/avatar/Steve">
            <p>Admin</p>
        </div>
    </div>
</section>

<script>

/* COPY IP (FEATURE #8) */
function copyIP(){
    navigator.clipboard.writeText("play.fallenhalo.net");
    alert("IP Copied!");
}

/* ANIMATIONS (FEATURE #9) */
const obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
        if(e.isIntersecting) e.target.classList.add("show");
    });
});

document.querySelectorAll(".fade").forEach(el=>obs.observe(el));

/* BACKGROUND DOTS (FEATURE #4) */
const bg = document.getElementById("bg");

for(let i=0;i<30;i++){
    let d = document.createElement("div");
    d.className="dot";
    d.style.left=Math.random()*100+"%";
    d.style.animationDuration=(5+Math.random()*10)+"s";
    bg.appendChild(d);
}

</script>

</body>
</html>
