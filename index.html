<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fallen Halo Network</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* GLOBAL */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#e6fffb,#f7fffe,#ffffff);
    color:#1f2a2a;
    overflow-x:hidden;
}

/* ========================= */
/* NAV */
/* ========================= */

nav{
    position:fixed;
    top:0;
    width:100%;
    z-index:999;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 7%;

    background:rgba(235,255,252,0.75);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(63,199,183,0.15);
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:700;
    color:#3fc7b7;
}

.logo img{
    width:42px;
    border-radius:12px;
}

/* ========================= */
/* NAV LINKS */
/* ========================= */

.nav-links a{
    margin-left:16px;
    text-decoration:none;
    color:#2b3b3a;

    padding:8px 12px;
    border-radius:12px;

    display:inline-block;
    transition:0.25s;
}

.nav-links a:hover{
    transform:scale(1.12);
    background:rgba(63,199,183,0.15);
    color:#3fc7b7;
    box-shadow:0 8px 25px rgba(63,199,183,0.2);
}

/* ========================= */
/* HERO */
/* ========================= */

.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:65px;
}

.gradient{
    background:linear-gradient(90deg,#3fc7b7,#7ff2e3);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ========================= */
/* SECTIONS */
/* ========================= */

section{
    padding:110px 7%;
}

.section-title{
    text-align:center;
    margin-bottom:40px;
}

/* ========================= */
/* FEATURES (GLOW RESTORED) */
/* ========================= */

.features{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
}

.feature{
    background:rgba(63,199,183,0.08);
    border:1px solid rgba(63,199,183,0.2);

    padding:30px;
    border-radius:24px;

    transition:0.35s ease;
}

.feature:hover{
    transform:translateY(-8px) scale(1.05);
    box-shadow:0 18px 45px rgba(63,199,183,0.25);
    background:rgba(63,199,183,0.12);
}

/* ========================= */
/* GALLERY (GLOW RESTORED) */
/* ========================= */

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    height:240px;
    object-fit:cover;
    border-radius:22px;

    border:1px solid rgba(63,199,183,0.2);
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.04);
    box-shadow:0 18px 45px rgba(63,199,183,0.25);
}

/* ========================= */
/* BUTTONS (IP + DISCORD GLOW FIX) */
/* ========================= */

.btn{
    display:inline-block;
    margin:10px 8px 0;
    padding:10px 16px;
    border-radius:12px;
    text-decoration:none;
    font-weight:600;

    transition:0.3s;
}

/* IP BUTTON */
.ip-btn{
    background:#3fc7b7;
    color:white;
}

.ip-btn:hover{
    transform:scale(1.08);
    box-shadow:0 10px 25px rgba(63,199,183,0.35);
}

/* DISCORD BUTTON */
.discord-btn{
    background:#5865F2;
    color:white;
}

.discord-btn:hover{
    transform:scale(1.08);
    box-shadow:0 10px 25px rgba(88,101,242,0.35);
}

/* ========================= */
/* FADE IN */
/* ========================= */

.fade{
    opacity:0;
    transform:translateY(40px);
    transition:0.8s;
}

.fade.show{
    opacity:1;
    transform:translateY(0);
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
    <div class="logo">
        <img src="https://mc-heads.net/avatar/Steve">
        Fallen Halo
    </div>

    <div class="nav-links">
        <a href="#features">Features</a>
        <a href="#gallery">Gallery</a>
        <a href="staff.html">Staff</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero fade">
    <div>
        <h1>Fallen Halo<br><span class="gradient">Network</span></h1>

        <!-- IP + DISCORD (GLOW RESTORED) -->
        <div>
            <button class="btn ip-btn" onclick="copyIP()">Copy IP</button>
            <a class="btn discord-btn" href="#">Discord</a>
        </div>
    </div>
</section>

<!-- FEATURES -->
<section id="features" class="fade">
    <div class="section-title">
        <h2>Features</h2>
    </div>

    <div class="features">
        <div class="feature">Economy System</div>
        <div class="feature">Custom Events</div>
        <div class="feature">Active Community</div>
    </div>
</section>

<!-- GALLERY -->
<section id="gallery" class="fade">
    <div class="section-title">
        <h2>Gallery</h2>
    </div>

    <div class="gallery">
        <img src="1.png">
        <img src="2.png">
        <img src="3.png">
    </div>
</section>

<script>

/* COPY IP */
function copyIP(){
    navigator.clipboard.writeText("play.fallenhalo.net");
    alert("IP Copied!");
}

/* FADE */
const obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
        if(e.isIntersecting) e.target.classList.add("show");
    });
});

document.querySelectorAll(".fade").forEach(el=>obs.observe(el));

</script>

</body>
</html>
