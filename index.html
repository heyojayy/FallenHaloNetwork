<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fallen Halo Network</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* GLOBAL */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
    color:#1f2a2a;
    background:linear-gradient(135deg,#e6fffb,#f7fffe,#ffffff);
}

/* ========================= */
/* NAVBAR */
/* ========================= */

nav{
    position:fixed;
    top:0;
    width:100%;
    z-index:999;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 7%;

    background:rgba(235,255,252,0.75);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(63,199,183,0.15);
}

/* LOGO */
.logo{
    display:flex;
    align-items:center;
    gap:10px;

    font-size:22px;
    font-weight:700;
    color:#3fc7b7;
}

.logo img{
    width:42px;
    height:42px;
    border-radius:12px;
}

/* ========================= */
/* NAV LINKS (DESKTOP) */
/* ========================= */

.nav-links{
    display:flex;
    gap:18px;
}

/* PREMIUM HOVER CARD EFFECT */
.nav-links a{
    text-decoration:none;
    color:#2b3b3a;
    font-weight:500;

    padding:8px 14px;
    border-radius:12px;

    transition:0.25s ease;
}

.nav-links a:hover{
    transform:scale(1.12);
    background:rgba(63,199,183,0.12);
    color:#3fc7b7;
    box-shadow:0 8px 20px rgba(63,199,183,0.15);
}

/* ========================= */
/* HAMBURGER (MOBILE) */
/* ========================= */

.hamburger{
    display:none;
    flex-direction:column;
    cursor:pointer;
    gap:5px;
}

.hamburger div{
    width:25px;
    height:3px;
    background:#3fc7b7;
    border-radius:5px;
}

/* MOBILE MENU */
.mobile-menu{
    display:none;
    flex-direction:column;
    position:absolute;
    top:70px;
    right:7%;
    background:white;
    padding:15px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.mobile-menu a{
    padding:10px;
    text-decoration:none;
    color:#2b3b3a;
    border-radius:10px;
}

.mobile-menu a:hover{
    background:rgba(63,199,183,0.12);
    color:#3fc7b7;
}

/* ========================= */
/* HERO */
/* ========================= */

.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:140px 7% 80px;
}

.hero h1{
    font-size:70px;
    line-height:1;
}

.gradient{
    background:linear-gradient(90deg,#3fc7b7,#7ff2e3);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ========================= */
/* SECTIONS */
/* ========================= */

section{
    padding:110px 7%;
}

.section-title{
    text-align:center;
    margin-bottom:50px;
}

/* ========================= */
/* FEATURES */
/* ========================= */

.features{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.feature{
    background:rgba(63,199,183,0.08);
    border:1px solid rgba(63,199,183,0.2);

    padding:30px;
    border-radius:24px;

    transition:0.35s ease;
}

.feature:hover{
    transform:scale(1.06);
    box-shadow:0 15px 40px rgba(63,199,183,0.18);
}

/* ========================= */
/* BUTTON */
/* ========================= */

.btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 16px;
    background:#3fc7b7;
    color:white;
    border-radius:12px;
    text-decoration:none;
}

/* ========================= */
/* GALLERY */
/* ========================= */

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    height:240px;
    object-fit:cover;
    border-radius:22px;
}

/* ========================= */
/* FAQ */
/* ========================= */

#faq{
    background:#ffffff;
}

.faq{
    max-width:900px;
    margin:auto;
}

.faq-item{
    border:1px solid rgba(0,0,0,0.08);
    border-radius:16px;
    margin-bottom:12px;
    overflow:hidden;
    cursor:pointer;
}

.faq-question{
    padding:20px;
    display:flex;
    justify-content:space-between;
}

.faq-question span{
    color:#3fc7b7;
}

.faq-content{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.45s ease;
}

.faq-inner p{
    padding:0 20px 18px;
    color:#555;
}

.faq-item.active .faq-content{
    max-height:200px;
}

/* ========================= */
/* FOOTER */
/* ========================= */

footer{
    text-align:center;
    padding:40px;
    background:#f7fffe;
    color:#666;
}

/* ========================= */
/* MOBILE RESPONSIVE */
/* ========================= */

@media (max-width:768px){

    .nav-links{
        display:none;
    }

    .hamburger{
        display:flex;
    }

    .hero h1{
        font-size:42px;
    }
}

</style>
</head>

<body>

<!-- NAV -->
<nav>

    <div class="logo">
        <img src="https://mc-heads.net/avatar/Steve">
        Fallen Halo
    </div>

    <div class="nav-links">
        <a href="#features">Features</a>
        <a href="#gallery">Gallery</a>
        <a href="#faq">FAQ</a>
        <a href="staff.html">Staff</a>
    </div>

    <!-- MOBILE BUTTON -->
    <div class="hamburger" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </div>

</nav>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobileMenu">
    <a href="#features">Features</a>
    <a href="#gallery">Gallery</a>
    <a href="#faq">FAQ</a>
    <a href="staff.html">Staff</a>
</div>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>Fallen Halo<br><span class="gradient">Network</span></h1>
    </div>
</section>

<!-- FEATURES -->
<section id="features">
    <div class="section-title">
        <h2>Features</h2>
    </div>

    <div class="features">
        <div class="feature">
            <h3>Economy</h3>
            <p>Earn money, trade and grow.</p>
        </div>

        <div class="feature">
            <h3>Events</h3>
            <p>Weekly PvP battles and rewards.</p>
        </div>

        <div class="feature">
            <h3>Community</h3>
            <p>Active players & staff team.</p>
        </div>
    </div>
</section>

<!-- GALLERY -->
<section id="gallery">
    <div class="section-title">
        <h2>Gallery</h2>
    </div>

    <div class="gallery">
        <img src="1.png">
        <img src="2.png">
        <img src="3.png">
    </div>
</section>

<!-- FAQ -->
<section id="faq">
    <div class="section-title">
        <h2>FAQ</h2>
    </div>

    <div class="faq">

        <div class="faq-item">
            <div class="faq-question">
                What is the IP?
                <span>+</span>
            </div>
            <div class="faq-content">
                <div class="faq-inner">
                    <p>play.fallenhalo.net</p>
                </div>
            </div>
        </div>

    </div>
</section>

<!-- FOOTER -->
<footer>
    © 2026 Fallen Halo Network
</footer>

<script>

/* FAQ */
document.querySelectorAll(".faq-item").forEach(item=>{
    item.addEventListener("click",()=>{
        item.classList.toggle("active");
    });
});

/* MOBILE MENU */
function toggleMenu(){
    const menu = document.getElementById("mobileMenu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

</script>

</body>
</html>
