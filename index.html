<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fallen Halo Network</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* GLOBAL */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
    color:#1f2a2a;

    background:linear-gradient(135deg,#e6fffb,#f7fffe,#ffffff);
}

/* ========================= */
/* NAV (with player head restored) */
/* ========================= */

nav{
    position:fixed;
    top:0;
    width:100%;
    z-index:999;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 7%;

    background:rgba(235,255,252,0.75);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(63,199,183,0.15);
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;

    font-size:22px;
    font-weight:700;
    color:#3fc7b7;
}

/* 👤 PLAYER HEAD BACK */
.logo img{
    width:42px;
    height:42px;
    border-radius:12px;
}

/* NAV LINKS */
.nav-links{
    display:flex;
    gap:22px;
}

.nav-links a{
    text-decoration:none;
    color:#2b3b3a;
    font-weight:500;
    transition:0.25s;
}

/* 🔥 NAV HOVER SCALE */
.nav-links a:hover{
    transform:scale(1.12);
    color:#3fc7b7;
}

/* ========================= */
/* HERO */
/* ========================= */

.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:140px 7% 80px;
}

.hero h1{
    font-size:70px;
    line-height:1;
}

.gradient{
    background:linear-gradient(90deg,#3fc7b7,#7ff2e3);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ========================= */
/* SECTIONS */
/* ========================= */

section{
    padding:110px 7%;
}

.section-title{
    text-align:center;
    margin-bottom:50px;
}

/* ========================= */
/* FEATURES (BOX HOVER FIXED) */
/* ========================= */

.features{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

/* 🔥 THIS is what you meant */
.feature{
    background:rgba(63,199,183,0.08);
    border:1px solid rgba(63,199,183,0.2);

    padding:30px;
    border-radius:24px;

    transition:0.35s ease;
    cursor:pointer;
}

/* BIG SMOOTH HOVER BOX EFFECT */
.feature:hover{
    transform:scale(1.06);
    box-shadow:0 15px 40px rgba(63,199,183,0.18);
    background:rgba(63,199,183,0.12);
}

.feature h3{
    color:#2fb8a9;
    margin-bottom:10px;
}

.feature p{
    color:#4a5a59;
    font-size:14px;
}

/* ========================= */
/* BUTTON (kept clean, not affecting hover boxes) */
/* ========================= */

.btn{
    display:inline-block;
    margin-top:12px;
    padding:10px 18px;
    border-radius:12px;
    background:#3fc7b7;
    color:white;
    text-decoration:none;
    font-weight:600;
}

/* ========================= */
/* GALLERY */
/* ========================= */

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    height:240px;
    object-fit:cover;
    border-radius:22px;
    border:1px solid rgba(63,199,183,0.2);
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.03);
}

/* ========================= */
/* FAQ (UNCHANGED GOOD VERSION) */
/* ========================= */

#faq{
    background:#ffffff;
}

.faq{
    max-width:900px;
    margin:auto;
}

.faq-item{
    border:1px solid rgba(0,0,0,0.08);
    border-radius:16px;
    margin-bottom:12px;
    overflow:hidden;
    cursor:pointer;
}

.faq-question{
    padding:20px;
    display:flex;
    justify-content:space-between;
}

.faq-question span{
    color:#3fc7b7;
}

.faq-content{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.45s ease;
}

.faq-inner p{
    padding:0 20px 18px;
    color:#555;
}

.faq-item.active .faq-content{
    max-height:200px;
}

/* ========================= */
/* FOOTER */
/* ========================= */

footer{
    text-align:center;
    padding:40px;
    background:#f7fffe;
    color:#666;
}

/* ========================= */
/* ANIMATION */
/* ========================= */

.fade-in{
    opacity:0;
    transform:translateY(40px);
    transition:0.8s ease;
}

.fade-in.show{
    opacity:1;
    transform:translateY(0);
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
    <div class="logo">
        <img src="https://mc-heads.net/avatar/Steve">
        Fallen Halo
    </div>

    <div class="nav-links">
        <a href="#features">Features</a>
        <a href="#gallery">Gallery</a>
        <a href="#faq">FAQ</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>Fallen Halo<br><span class="gradient">Network</span></h1>
    </div>
</section>

<!-- FEATURES -->
<section id="features">
    <div class="section-title fade-in">
        <h2>Features</h2>
    </div>

    <div class="features">
        <div class="feature fade-in">
            <h3>Economy System</h3>
            <p>Earn money, build shops and trade.</p>
        </div>

        <div class="feature fade-in">
            <h3>Custom Events</h3>
            <p>Weekly PvP battles and rewards.</p>
        </div>

        <div class="feature fade-in">
            <h3>Community</h3>
            <p>Friendly players and active staff.</p>
        </div>
    </div>
</section>

<!-- GALLERY -->
<section id="gallery">
    <div class="section-title fade-in">
        <h2>Gallery</h2>
    </div>

    <div class="gallery">
        <img class="fade-in" src="1.png">
        <img class="fade-in" src="2.png">
        <img class="fade-in" src="3.png">
    </div>
</section>

<!-- FAQ -->
<section id="faq">
    <div class="section-title fade-in">
        <h2>FAQ</h2>
    </div>

    <div class="faq">

        <div class="faq-item fade-in">
            <div class="faq-question">
                What is the IP?
                <span>+</span>
            </div>
            <div class="faq-content">
                <div class="faq-inner">
                    <p>play.fallenhalo.net</p>
                </div>
            </div>
        </div>

    </div>
</section>

<!-- FOOTER -->
<footer class="fade-in">
    © 2026 Fallen Halo Network
</footer>

<script>

/* fade */
const observer = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
        if(e.isIntersecting){
            e.target.classList.add("show");
        }
    });
},{threshold:0.15});

document.querySelectorAll(".fade-in").forEach(el=>{
    observer.observe(el);
});

/* FAQ */
document.querySelectorAll(".faq-item").forEach(item=>{
    item.addEventListener("click",()=>{
        item.classList.toggle("active");
    });
});

</script>

</body>
</html>
