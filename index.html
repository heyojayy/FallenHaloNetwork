<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fallen Halo Network</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* GLOBAL */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
    color:#222;

    background:
    radial-gradient(circle at top left,#d7fffb 0%,#ffffff 40%),
    radial-gradient(circle at bottom right,#c8faf5 0%,#ffffff 40%);
}

/* ========================= */
/* NAV */
/* ========================= */

nav{
    position:fixed;
    top:0;
    width:100%;
    z-index:999;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:20px 7%;

    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(120,230,220,0.15);
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;

    font-size:22px;
    font-weight:700;

    color:#55d2c8;
}

.logo img{
    width:50px;
    height:50px;
    border-radius:16px;
}

/* ========================= */
/* HERO */
/* ========================= */

.hero{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;

    gap:60px;

    padding:140px 7% 80px;
}

.hero-left{
    flex:1;
    min-width:300px;
}

/* ✅ GRADIENT FIX RESTORED */
.hero-left h1{
    font-size:70px;
    line-height:1;
    margin-bottom:20px;
}

.gradient{
    background:linear-gradient(90deg,#55d2c8,#9ff6ee);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ========================= */
/* SECTIONS */
/* ========================= */

section{
    padding:100px 7%;
}

.section-title{
    text-align:center;
    margin-bottom:60px;
}

.section-title h2{
    font-size:48px;
}

/* ========================= */
/* FEATURES */
/* ========================= */

.features{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.feature{
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(12px);
    padding:30px;
    border-radius:24px;
    border:1px solid rgba(120,230,220,0.15);
}

/* ========================= */
/* GALLERY */
/* ========================= */

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.gallery img{
    width:100%;
    height:240px;
    object-fit:cover;
    border-radius:24px;
}

/* ========================= */
/* STAFF */
/* ========================= */

.staff-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.staff-card{
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(12px);
    padding:30px;
    border-radius:24px;
    text-align:center;
}

/* ========================= */
/* FAQ */
/* ========================= */

.faq{
    max-width:900px;
    margin:auto;
}

.faq-item{
    background:rgba(255,255,255,0.75);
    border-radius:22px;
    margin-bottom:18px;
    overflow:hidden;
    cursor:pointer;
}

.faq-question{
    padding:22px 26px;
    display:flex;
    justify-content:space-between;
    font-weight:600;
}

.faq-question span{
    transition:0.3s;
    color:#55d2c8;
}

.faq-item.active .faq-question span{
    transform:rotate(45deg);
}

/* smooth animation */
.faq-content{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.45s ease;
}

.faq-inner p{
    padding:0 26px 22px;
    color:#666;
}

.faq-item.active .faq-content{
    max-height:200px;
}

/* ========================= */
/* FOOTER */
/* ========================= */

footer{
    text-align:center;
    padding:40px;
    color:#666;
}

/* ========================= */
/* FADE IN */
/* ========================= */

.fade-in{
    opacity:0;
    transform:translateY(40px);
    transition:0.8s ease;
}

.fade-in.show{
    opacity:1;
    transform:translateY(0);
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
    <div class="logo">
        <img src="logo.png">
        Fallen Halo
    </div>

    <div class="nav-links">
        <a href="#features">Features</a>
        <a href="#gallery">Gallery</a>
        <a href="#staff">Staff</a>
        <a href="#faq">FAQ</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <div class="hero-left fade-in">
        <h1>Fallen Halo<br>
            <span class="gradient">Network</span>
        </h1>
    </div>
</section>

<!-- FEATURES -->
<section id="features">
    <div class="section-title fade-in">
        <h2>Features</h2>
    </div>

    <div class="features">
        <div class="feature fade-in">Economy System</div>
        <div class="feature fade-in">Events</div>
        <div class="feature fade-in">Community</div>
    </div>
</section>

<!-- GALLERY -->
<section id="gallery">
    <div class="section-title fade-in">
        <h2>Gallery</h2>
    </div>

    <div class="gallery">
        <img class="fade-in" src="1.png">
        <img class="fade-in" src="2.png">
        <img class="fade-in" src="3.png">
    </div>
</section>

<!-- STAFF -->
<section id="staff">
    <div class="section-title fade-in">
        <h2>Staff Team</h2>
    </div>

    <div class="staff-grid">
        <div class="staff-card fade-in">
            <img src="https://mc-heads.net/avatar/Notch">
            <p>Owner</p>
        </div>
    </div>
</section>

<!-- FAQ -->
<section id="faq">
    <div class="section-title fade-in">
        <h2>FAQ</h2>
    </div>

    <div class="faq">

        <div class="faq-item fade-in">
            <div class="faq-question">
                What is the IP?
                <span>+</span>
            </div>
            <div class="faq-content">
                <div class="faq-inner">
                    <p>play.fallenhalo.net</p>
                </div>
            </div>
        </div>

    </div>
</section>

<!-- FOOTER -->
<footer class="fade-in">
    © 2026 Fallen Halo Network
</footer>

<script>

/* fade in */
const observer = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
        if(e.isIntersecting){
            e.target.classList.add("show");
        }
    });
},{threshold:0.15});

document.querySelectorAll(".fade-in").forEach(el=>{
    observer.observe(el);
});

/* FAQ toggle */
document.querySelectorAll(".faq-item").forEach(item=>{
    item.addEventListener("click",()=>{
        item.classList.toggle("active");
    });
});

</script>

</body>
</html>
