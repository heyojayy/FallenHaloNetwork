<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fallen Halo Network</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* GLOBAL */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
    -webkit-tap-highlight-color:transparent;
}

body{
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
    color:#222;

    background:
    radial-gradient(circle at top left,#d7fffb 0%,#ffffff 40%),
    radial-gradient(circle at bottom right,#c8faf5 0%,#ffffff 40%);
}

/* ========================= */
/* NAV */
/* ========================= */

nav{
    position:fixed;
    top:0;
    width:100%;
    z-index:999;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:20px 7%;

    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(14px);

    border-bottom:1px solid rgba(120,230,220,0.15);
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;

    font-size:22px;
    font-weight:700;

    color:#55d2c8;
}

.logo img{
    width:50px;
    height:50px;

    border-radius:16px;
    background:#eee;
}

.nav-links{
    display:flex;
    gap:30px;
}

.nav-links a{
    text-decoration:none;
    color:#333;
    font-weight:500;
}

.nav-links a:hover{
    color:#55d2c8;
}

/* ========================= */
/* HERO */
/* ========================= */

.hero{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;

    gap:60px;

    padding:140px 7% 80px;
}

.hero-left{
    flex:1;
    min-width:300px;
}

.hero-left h1{
    font-size:70px;
    line-height:1;
    margin-bottom:20px;
}

.gradient{
    background:linear-gradient(90deg,#55d2c8,#9ff6ee);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero-left p{
    color:#666;
    font-size:18px;
    line-height:1.8;
    margin-bottom:30px;
    max-width:600px;
}

/* ========================= */
/* BUTTONS */
/* ========================= */

.btn{
    padding:14px 28px;
    border-radius:14px;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
}

.btn-main{
    background:#55d2c8;
    color:white;
}

.btn-main:hover{
    transform:translateY(-4px);
}

.btn-secondary{
    border:2px solid #55d2c8;
    color:#55d2c8;
}

/* ========================= */
/* FAQ (ONLY IMPROVED PART) */
/* ========================= */

.faq{
    max-width:900px;
    margin:auto;
}

.faq-item{
    background:rgba(255,255,255,0.75);
    backdrop-filter:blur(12px);

    border-radius:22px;
    margin-bottom:18px;

    border:1px solid rgba(120,230,220,0.15);

    overflow:hidden;
}

/* header */
.faq-item summary{
    padding:22px 26px;
    cursor:pointer;

    font-weight:600;
    font-size:18px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    list-style:none;
}

.faq-item summary::-webkit-details-marker{
    display:none;
}

/* plus icon */
.faq-item summary span{
    font-size:24px;
    color:#55d2c8;

    transition:0.35s ease;
}

.faq-item[open] summary span{
    transform:rotate(45deg);
}

/* smooth roll-down animation */
.faq-content{
    display:grid;
    grid-template-rows:0fr;
    transition:grid-template-rows 0.45s cubic-bezier(.4,0,.2,1);
}

.faq-inner{
    overflow:hidden;
}

/* open state */
.faq-item[open] .faq-content{
    grid-template-rows:1fr;
}

/* text animation */
.faq-inner p{
    padding:0 26px 22px;
    color:#666;
    line-height:1.8;

    opacity:0;
    transform:translateY(-10px);
    transition:0.35s ease;
}

.faq-item[open] .faq-inner p{
    opacity:1;
    transform:translateY(0);
}

/* ========================= */
/* FOOTER */
/* ========================= */

footer{
    text-align:center;
    padding:40px;

    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(10px);

    border-top:1px solid rgba(120,230,220,0.15);

    color:#666;
}

/* ========================= */
/* FADE IN */
/* ========================= */

.fade-in{
    opacity:0;
    transform:translateY(50px);
    transition:1s;
}

.fade-in.show{
    opacity:1;
    transform:translateY(0);
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:900px){
.hero-left h1{
    font-size:52px;
}

.nav-links{
    display:none;
}
}

</style>
</head>

<body>

<!-- NAV -->

<nav>
    <div class="logo">
        <img src="logo.png">
        Fallen Halo
    </div>

    <div class="nav-links">
        <a href="#faq">FAQ</a>
    </div>
</nav>

<!-- HERO -->

<section class="hero">

    <div class="hero-left fade-in">
        <h1>Fallen Halo<br><span class="gradient">Network</span></h1>

        <p>
            Minecraft server with economy, PvP, events and community.
        </p>

        <a class="btn btn-main" href="#">Play Now</a>
        <a class="btn btn-secondary" href="#">Discord</a>
    </div>

</section>

<!-- FAQ -->

<section id="faq">

    <div class="faq">

        <details class="faq-item fade-in">

            <summary>
                What is the server IP?
                <span>+</span>
            </summary>

            <div class="faq-content">
                <div class="faq-inner">
                    <p>play.fallenhalo.net</p>
                </div>
            </div>

        </details>

        <details class="faq-item fade-in">

            <summary>
                What version is it?
                <span>+</span>
            </summary>

            <div class="faq-content">
                <div class="faq-inner">
                    <p>1.21+ Java Edition</p>
                </div>
            </div>

        </details>

        <details class="faq-item fade-in">

            <summary>
                How do I join Discord?
                <span>+</span>
            </summary>

            <div class="faq-content">
                <div class="faq-inner">
                    <p>Insert your Discord link here.</p>
                </div>
            </div>

        </details>

    </div>

</section>

<!-- FOOTER -->

<footer class="fade-in">
    © 2026 Fallen Halo Network
</footer>

<script>

const observer = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
        if(e.isIntersecting){
            e.target.classList.add("show");
        }
    });
},{threshold:0.15});

document.querySelectorAll(".fade-in").forEach(el=>{
    observer.observe(el);
});

</script>

</body>
</html>
