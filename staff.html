<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fallen Halo Staff</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* GLOBAL */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#e6fffb,#ffffff);
    color:#1f2a2a;
}

/* ========================= */
/* SECTION */
/* ========================= */

section{
    padding:120px 7%;
}

.title{
    text-align:center;
    font-size:42px;
    margin-bottom:40px;
    color:#3fc7b7;
}

/* ========================= */
/* STAFF GRID */
/* ========================= */

.staff-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

/* ========================= */
/* STAFF CARD (NEW PREMIUM UI) */
/* ========================= */

.card{
    position:relative;

    background:white;
    border-radius:22px;

    padding:22px;

    text-align:center;

    transition:0.35s ease;

    border:2px solid rgba(63,199,183,0.2);

    box-shadow:0 10px 25px rgba(0,0,0,0.05);

    overflow:hidden;
}

/* glow effect */
.card::before{
    content:"";
    position:absolute;
    inset:-2px;

    background:linear-gradient(135deg,#3fc7b7,#7ff2e3);

    opacity:0;

    transition:0.4s;

    z-index:0;
}

.card:hover::before{
    opacity:0.15;
}

/* hover animation */
.card:hover{
    transform:translateY(-10px) scale(1.03);
    box-shadow:0 20px 50px rgba(63,199,183,0.25);
}

/* avatar */
.card img{
    width:90px;
    height:90px;
    border-radius:16px;

    margin-bottom:12px;

    position:relative;
    z-index:1;
}

/* name */
.card h3{
    margin-bottom:5px;
    position:relative;
    z-index:1;
}

/* rank */
.rank{
    font-size:13px;
    font-weight:600;

    padding:4px 10px;
    border-radius:999px;

    display:inline-block;

    margin-bottom:10px;

    position:relative;
    z-index:1;
}

/* bio */
.card p{
    font-size:13px;
    color:#666;

    position:relative;
    z-index:1;

    margin-top:8px;
}

/* ========================= */
/* RANK COLORS */
/* ========================= */

.owner{
    color:#ff4d4d;
    background:rgba(255,77,77,0.1);
}

.admin{
    color:#ff9f1c;
    background:rgba(255,159,28,0.1);
}

.mod{
    color:#3fc7b7;
    background:rgba(63,199,183,0.12);
}

/* ========================= */
/* MOBILE */
/* ========================= */

@media(max-width:768px){
    .title{
        font-size:32px;
    }
}

</style>
</head>

<body>

<section>

    <div class="title">Staff Team</div>

    <div class="staff-grid">

        <!-- OWNER -->
        <div class="card">
            <img src="https://mc-heads.net/avatar/Steve">
            <div class="rank owner">OWNER</div>
            <h3>Steve</h3>
            <p>Founder of Fallen Halo Network. Handles development & management.</p>
        </div>

        <!-- ADMIN -->
        <div class="card">
            <img src="https://mc-heads.net/avatar/Alex">
            <div class="rank admin">ADMIN</div>
            <h3>Alex</h3>
            <p>Manages server operations, events and community support.</p>
        </div>

        <!-- MOD -->
        <div class="card">
            <img src="https://mc-heads.net/avatar/Notch">
            <div class="rank mod">MOD</div>
            <h3>Notch</h3>
            <p>Helps players, enforces rules and keeps server clean.</p>
        </div>

    </div>

</section>

</body>
</html>
