<html lang="en">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
        }

<style>

/* ===================================== */
/* ROOT COLORS + ANIMATED GRADIENT */
/* ===================================== */

:root{
    --bg-start: #0a0c12;
    --bg-mid: #111827;
    --bg-end: #0f172a;
    --text: #ffffff;
    --text-soft: #cbd5e1;
    --card: rgba(255,255,255,.04);
    --card-border: rgba(255,255,255,.07);
    --navbar-bg: rgba(5,7,12,.65);
    --gradient1-start: #e2e6ee;
    --gradient1-end: #c5d3f0;
    --gradient2-start: #a6b8e4;
    --gradient2-end: #7a9ad6;
    --shadow: rgba(166,184,228,.15);
    --btn-hover: rgba(166,184,228,.12);
    --accent-glow: #a6b8e4;
    --rank-founder: linear-gradient(135deg, #ffd700, #ffaa00);
    --rank-executive: linear-gradient(135deg, #ff5555, #cc3333);
    --rank-head: linear-gradient(135deg, #55ff55, #22aa22);
}

/* LIGHT MODE */
body.light-mode{
    --bg-start: #f0f4fa;
    --bg-mid: #e8edf6;
    --bg-end: #dfe6f2;
    --text: #0f172a;
    --text-soft: #334155;
    --card: rgba(255,255,255,.8);
    --card-border: rgba(0,0,0,.06);
    --navbar-bg: rgba(255,255,255,.75);
    --gradient1-start: #8ca3dd;
    --gradient1-end: #6b8bc9;
    --gradient2-start: #5d79be;
    --gradient2-end: #4a61a3;
    --shadow: rgba(93,121,190,.2);
    --btn-hover: rgba(93,121,190,.12);
    --accent-glow: #5d79be;
    --rank-founder: linear-gradient(135deg, #d4af37, #b8860b);
    --rank-executive: linear-gradient(135deg, #dc3545, #a71d2a);
    --rank-head: linear-gradient(135deg, #28a745, #1e7e34);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Poppins',sans-serif;
    color:var(--text);
    overflow-x:hidden;
    transition: color 0.35s ease;
}

/* ANIMATED GRADIENT BACKGROUND */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 30% 40%, var(--bg-mid) 0%, var(--bg-start) 50%, var(--bg-end) 100%);
    z-index: -6;
    transition: background 0.7s cubic-bezier(0.2, 0.95, 0.3, 1.05);
    will-change: background;
}

body.light-mode::before {
    background: radial-gradient(ellipse at 70% 30%, var(--bg-mid) 0%, var(--bg-start) 60%, var(--bg-end) 100%);
}

/* floating orbs */
.glow-bg{
    position:fixed;
    inset:0;
    z-index:-5;
    pointer-events:none;
}
.glow-sphere{
    position:absolute;
    border-radius:50%;
    filter:blur(140px);
    opacity:0.55;
    transition: background 0.6s ease, transform 0.4s ease;
    animation: floatOrb 18s infinite alternate ease-in-out;
}
.glow-sphere.one{
    width:550px;
    height:550px;
    background: var(--gradient1-start);
    top:-180px;
    left:-120px;
}
.glow-sphere.two{
    width:500px;
    height:500px;
    background: var(--gradient2-start);
    bottom:-120px;
    right:-80px;
    animation-delay: -5s;
}
.glow-sphere.three{
    width:400px;
    height:400px;
    background: var(--gradient2-end);
    bottom:15%;
    left:15%;
    opacity:0.35;
    animation-delay: -10s;
}
body.light-mode .glow-sphere.one{
    background: #b7c9f0;
}
body.light-mode .glow-sphere.two{
    background: #6d8ed1;
}
body.light-mode .glow-sphere.three{
    background: #8aa9df;
}

@keyframes floatOrb {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(40px, -30px) scale(1.08); }
}

/* ===================================== */
/* HORIZONTAL NAVBAR - EDGE ALIGNMENT */
/* ===================================== */

nav{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
    backdrop-filter: blur(20px);
    background: var(--navbar-bg);
    border-bottom: 1px solid var(--card-border);
    transition: background 0.3s, border-color 0.3s;
}

.nav-container{
    max-width: 1600px;
    margin: 0 auto;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
}

.logo{
    display: flex;
    align-items: center;
    gap: 14px;
    font-weight: 700;
    font-size: 1.2rem;
    letter-spacing: -0.2px;
    flex-shrink: 0;
}

.logo img{
    width: 48px;
    height: 48px;
    object-fit: contain;
    filter: drop-shadow(0 0 8px var(--shadow));
    transition: filter 0.3s;
}

.logo .logo-text{
    background: linear-gradient(135deg, var(--gradient1-start), var(--gradient2-end));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
}

.nav-right{
    display: flex;
    align-items: center;
    gap: 28px;
    flex-shrink: 0;
}

.nav-links{
    display: flex;
    align-items: center;
    gap: 32px;
}

.nav-links a{
    color: var(--text);
    text-decoration: none;
    font-weight: 500;
    font-size: 0.95rem;
    transition: 0.2s;
    position: relative;
    opacity: 0.9;
}

.nav-links a::after{
    content: "";
    position: absolute;
    left: 0;
    bottom: -6px;
    width: 0%;
    height: 2px;
    background: linear-gradient(90deg, var(--gradient1-start), var(--gradient2-start));
    transition: 0.3s;
}

.nav-links a:hover::after{
    width: 100%;
}

.nav-links a:hover{
    opacity: 1;
}

.theme-toggle{
    width: 46px;
    height: 46px;
    border-radius: 30px;
    border: 1px solid var(--card-border);
    background: var(--card);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.25s ease;
    backdrop-filter: blur(8px);
    padding: 0;
}

.theme-toggle svg{
    width: 22px;
    height: 22px;
    stroke: var(--text);
    stroke-width: 1.8;
    fill: none;
    transition: stroke 0.2s;
}

.theme-toggle:hover{
    transform: translateY(-2px);
    box-shadow: 0 6px 18px var(--shadow);
}

/* responsive */
@media (max-width: 680px) {
    .nav-container { padding: 12px 20px; flex-wrap: wrap; }
    .nav-links { gap: 18px; }
    .nav-right { gap: 16px; }
    .logo .logo-text { font-size: 0.9rem; }
    .logo img { width: 38px; height: 38px; }
}
@media (max-width: 550px) {
    .nav-links { gap: 12px; }
    .nav-links a { font-size: 0.8rem; }
    .theme-toggle { width: 40px; height: 40px; }
}

/* ===================================== */
/* STAFF PAGE SPECIFIC */
/* ===================================== */

.hero{
    min-height: 40vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 140px 20px 60px;
}
.hero-content{
    max-width: 1000px;
}
.hero h1{
    font-size: 4rem;
    line-height: 1.1;
    margin-bottom: 22px;
    background: linear-gradient(115deg, 
        var(--gradient1-start) 0%, 
        var(--gradient2-start) 35%,
        var(--gradient1-end) 65%,
        var(--gradient2-end) 100%);
    background-size: 300% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: smoothGradientFlow 8s ease infinite;
}
@keyframes smoothGradientFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
.hero p{
    font-size: 1.12rem;
    color: var(--text-soft);
}

.staff-section{
    padding: 40px 24px 100px;
}
.container{
    max-width: 1400px;
    margin: auto;
}

.staff-grid{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 45px;
    justify-items: center;
    align-items: start;
}

.staff-card{
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 32px;
    backdrop-filter: blur(12px);
    overflow: hidden;
    transition: 0.35s ease;
    width: 100%;
    max-width: 380px;
}

.staff-card:hover{
    transform: translateY(-10px);
    box-shadow: 0 25px 50px var(--shadow);
}

.model-container{
    width: 100%;
    height: 320px;
    background: linear-gradient(135deg, rgba(0,0,0,0.3), rgba(0,0,0,0.1));
    position: relative;
    overflow: hidden;
}

.model-container canvas{
    width: 100%;
    height: 100%;
    display: block;
}

.staff-info{
    padding: 24px 28px 32px;
    text-align: center;
}

.staff-name{
    font-size: 1.6rem;
    font-weight: 800;
    margin-bottom: 8px;
    letter-spacing: -0.3px;
}

.staff-rank{
    font-size: 0.85rem;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 30px;
    display: inline-block;
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.rank-badge-founder{
    background: var(--rank-founder);
    color: #1a1a2e;
    box-shadow: 0 0 15px rgba(255,215,0,0.3);
}
.rank-badge-executive{
    background: var(--rank-executive);
    color: white;
    box-shadow: 0 0 15px rgba(255,85,85,0.3);
}
.rank-badge-head{
    background: var(--rank-head);
    color: #1a1a2e;
    box-shadow: 0 0 15px rgba(85,255,85,0.3);
}

.staff-description{
    font-size: 0.9rem;
    color: var(--text-soft);
    line-height: 1.7;
    margin-bottom: 8px;
}

/* fade-in */
.fade-in{
    opacity: 0;
    transform: translateY(50px);
    transition: opacity 0.9s cubic-bezier(0.2, 0.9, 0.3, 1.1), transform 0.8s ease;
}
.fade-in.visible{
    opacity: 1;
    transform: translateY(0px);
}

/* footer */
.cool-footer{
    margin-top: 0;
    background: rgba(0,0,0,0.2);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--card-border);
    padding: 2rem 2rem 1.5rem;
}
.footer-inner{
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 30px;
}
.footer-brand h3{
    font-size: 1.5rem;
    background: linear-gradient(135deg, var(--gradient1-start), var(--gradient2-start));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}
.footer-brand p{
    color: var(--text-soft);
}
.footer-bottom{
    text-align: center;
    margin-top: 0;
    padding-top: 0;
    border-top: none;
    color: var(--text-soft);
}
</style>
</head>
<body>

<div class="glow-bg">
    <div class="glow-sphere one"></div>
    <div class="glow-sphere two"></div>
    <div class="glow-sphere three"></div>
</div>

<!-- NAVBAR: HOME is first button -->
<nav>
    <div class="nav-container">
        <div class="logo">
            <img src="logo.png" alt="Fallen Halo Logo">
            <span class="logo-text">FALLEN HALO</span>
        </div>
        <div class="nav-right">
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="staff.html">Staff</a>
            </div>
            <button class="theme-toggle" id="themeToggleBtn">
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
            </button>
        </div>
    </div>
</nav>

<main>
    <section class="hero fade-in visible">
        <div class="hero-content">
            <h1>Leadership Team</h1>
            <p>The dedicated individuals guiding Fallen Halo Network to greatness.</p>
        </div>
    </section>

    <section class="staff-section fade-in">
        <div class="container">
            <div class="staff-grid" id="staff-grid"></div>
        </div>
    </section>
</main>

<footer class="cool-footer fade-in">
    <div class="footer-inner">
        <div class="footer-brand">
            <h3>FALLEN HALO NETWORK</h3>
            <p>Led by passion, driven by excellence.</p>
        </div>
        <div class="footer-bottom">© 2026 Fallen Halo Network — Esteemed Leadership Team</div>
    </div>
</footer>

<script type="module">
    import * as THREE from 'three';
    
    // Staff Data with custom colors - 100% reliable, no external API needed
    const staffMembers = [
        { 
            name: "Ange1XDem0n", 
            rank: "Founder", 
            description: "Creator & Visionary behind Fallen Halo Network. Leading the server with passion and dedication since day one.",
            primaryColor: "#ffd700",
            secondaryColor: "#ffaa00",
            accentColor: "#ff6600",
            rankIcon: "👑",
            armorTrim: "#ffcc44"
        },
        { 
            name: "its_apex", 
            rank: "Executive", 
            description: "Executive Director managing operations, community growth, and strategic partnerships.",
            primaryColor: "#ff4444",
            secondaryColor: "#cc3333",
            accentColor: "#ff8888",
            rankIcon: "⚡",
            armorTrim: "#ff6666"
        },
        { 
            name: "abwyss", 
            rank: "Head Management", 
            description: "Head of Management overseeing staff, player relations, and server quality assurance.",
            primaryColor: "#44ff44",
            secondaryColor: "#33cc33",
            accentColor: "#88ff88",
            rankIcon: "📋",
            armorTrim: "#66ff66"
        }
    ];

    // Create high-quality custom 3D character with unique color scheme
    function createCustomModel(container, staff) {
        container.innerHTML = '';
        
        // Setup Scene
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setClearColor(0x000000, 0);
        container.appendChild(renderer.domElement);
        
        // Enhanced Lighting
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(5, 10, 7);
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x4466cc, 0.5);
        fillLight.position.set(-3, 2, 4);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xffaa66, 0.3);
        backLight.position.set(0, 3, -5);
        scene.add(backLight);
        
        const rimLight = new THREE.PointLight(0xff8866, 0.35);
        rimLight.position.set(2, 2, -3);
        scene.add(rimLight);
        
        const topLight = new THREE.PointLight(0xffffff, 0.4);
        topLight.position.set(0, 3, 0);
        scene.add(topLight);
        
        // Create character group
        const character = new THREE.Group();
        
        // Parse colors
        const primaryColor = new THREE.Color(staff.primaryColor);
        const secondaryColor = new THREE.Color(staff.secondaryColor);
        const trimColor = new THREE.Color(staff.armorTrim);
        
        // Body (base)
        const bodyGeo = new THREE.BoxGeometry(0.75, 1.15, 0.6);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.35, metalness: 0.2 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0;
        character.add(body);
        
        // Chestplate (custom rank color)
        const chestGeo = new THREE.BoxGeometry(0.82, 0.92, 0.67);
        const chestMat = new THREE.MeshStandardMaterial({ color: primaryColor, roughness: 0.25, metalness: 0.7, emissive: primaryColor, emissiveIntensity: 0.12 });
        const chestplate = new THREE.Mesh(chestGeo, chestMat);
        chestplate.position.y = 0.05;
        character.add(chestplate);
        
        // Chest emblem
        const emblemGeo = new THREE.SphereGeometry(0.12, 16, 16);
        const emblemMat = new THREE.MeshStandardMaterial({ color: trimColor, metalness: 0.9, emissive: trimColor, emissiveIntensity: 0.2 });
        const emblem = new THREE.Mesh(emblemGeo, emblemMat);
        emblem.position.set(0, 0.05, 0.45);
        character.add(emblem);
        
        // Head
        const headGeo = new THREE.BoxGeometry(0.72, 0.72, 0.72);
        const headMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.2, metalness: 0.1 });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 0.98;
        character.add(head);
        
        // Face details - glowing eyes
        const eyeGeometry = new THREE.SphereGeometry(0.08, 16, 16);
        const eyeMaterial = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00aaff, emissiveIntensity: 0.5 });
        const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        leftEye.position.set(-0.18, 1.08, 0.37);
        const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        rightEye.position.set(0.18, 1.08, 0.37);
        character.add(leftEye);
        character.add(rightEye);
        
        // Rank-specific head accessories
        if (staff.rank === "Founder") {
            // Epic Golden Crown
            const crownBase = new THREE.CylinderGeometry(0.48, 0.52, 0.18, 8);
            const crownMatGold = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.95, roughness: 0.15, emissive: 0xffaa00, emissiveIntensity: 0.3 });
            const crown = new THREE.Mesh(crownBase, crownMatGold);
            crown.position.y = 1.38;
            character.add(crown);
            
            // Crown spikes
            for (let i = 0; i < 5; i++) {
                const angle = (i / 5) * Math.PI * 2;
                const spikeGeo = new THREE.ConeGeometry(0.08, 0.2, 6);
                const spike = new THREE.Mesh(spikeGeo, crownMatGold);
                spike.position.set(Math.cos(angle) * 0.48, 1.47, Math.sin(angle) * 0.48);
                character.add(spike);
            }
            
            // Center jewel
            const jewelMat = new THREE.MeshStandardMaterial({ color: 0xff3366, emissive: 0xff3366, emissiveIntensity: 0.4 });
            const jewel = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), jewelMat);
            jewel.position.set(0, 1.45, 0.48);
            character.add(jewel);
            
            // Cape
            const capeGeo = new THREE.BoxGeometry(0.9, 1.2, 0.08);
            const capeMat = new THREE.MeshStandardMaterial({ color: 0x8B0000, metalness: 0.3, roughness: 0.5 });
            const cape = new THREE.Mesh(capeGeo, capeMat);
            cape.position.set(0, 0.1, -0.45);
            character.add(cape);
            
        } else if (staff.rank === "Executive") {
            // Executive helmet with visor
            const helmetGeo = new THREE.BoxGeometry(0.76, 0.3, 0.76);
            const helmetMat = new THREE.MeshStandardMaterial({ color: 0xcc3333, metalness: 0.8, roughness: 0.2 });
            const helmet = new THREE.Mesh(helmetGeo, helmetMat);
            helmet.position.y = 1.25;
            character.add(helmet);
            
            // Visor
            const visorGeo = new THREE.BoxGeometry(0.5, 0.1, 0.2);
            const visorMat = new THREE.MeshStandardMaterial({ color: 0x00aaff, metalness: 0.9, emissive: 0x0088ff, emissiveIntensity: 0.3 });
            const visor = new THREE.Mesh(visorGeo, visorMat);
            visor.position.set(0, 1.22, 0.45);
            character.add(visor);
            
            // Shoulder pads (larger)
            const padGeo = new THREE.BoxGeometry(0.35, 0.2, 0.4);
            const padMat = new THREE.MeshStandardMaterial({ color: 0xcc3333, metalness: 0.7 });
            const leftPad = new THREE.Mesh(padGeo, padMat);
            leftPad.position.set(-0.65, 0.7, 0);
            const rightPad = new THREE.Mesh(padGeo, padMat);
            rightPad.position.set(0.65, 0.7, 0);
            character.add(leftPad);
            character.add(rightPad);
            
        } else if (staff.rank === "Head Management") {
            // Management headpiece with hologram
            const headpieceGeo = new THREE.BoxGeometry(0.68, 0.15, 0.68);
            const headpieceMat = new THREE.MeshStandardMaterial({ color: 0x22aa22, metalness: 0.6, emissive: 0x22ff22, emissiveIntensity: 0.2 });
            const headpiece = new THREE.Mesh(headpieceGeo, headpieceMat);
            headpiece.position.y = 1.28;
            character.add(headpiece);
            
            // Holographic display on chest
            const holoGeo = new THREE.BoxGeometry(0.3, 0.2, 0.05);
            const holoMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 0.4 });
            const holoDisplay = new THREE.Mesh(holoGeo, holoMat);
            holoDisplay.position.set(0, 0.05, 0.48);
            character.add(holoDisplay);
        }
        
        // Legs
        const legGeo = new THREE.BoxGeometry(0.28, 0.55, 0.32);
        const legMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.4, metalness: 0.3 });
        const leftLeg = new THREE.Mesh(legGeo, legMat);
        leftLeg.position.set(-0.22, -0.58, 0);
        const rightLeg = new THREE.Mesh(legGeo, legMat);
        rightLeg.position.set(0.22, -0.58, 0);
        character.add(leftLeg);
        character.add(rightLeg);
        
        // Boots with rank trim
        const bootGeo = new THREE.BoxGeometry(0.34, 0.22, 0.4);
        const bootMat = new THREE.MeshStandardMaterial({ color: trimColor, metalness: 0.6, roughness: 0.3 });
        const leftBoot = new THREE.Mesh(bootGeo, bootMat);
        leftBoot.position.set(-0.22, -0.85, 0);
        const rightBoot = new THREE.Mesh(bootGeo, bootMat);
        rightBoot.position.set(0.22, -0.85, 0);
        character.add(leftBoot);
        character.add(rightBoot);
        
        // Arms
        const armGeo = new THREE.BoxGeometry(0.26, 0.72, 0.28);
        const armMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, roughness: 0.35 });
        const leftArm = new THREE.Mesh(armGeo, armMat);
        leftArm.position.set(-0.54, 0.28, 0);
        const rightArm = new THREE.Mesh(armGeo, armMat);
        rightArm.position.set(0.54, 0.28, 0);
        character.add(leftArm);
        character.add(rightArm);
        
        // Shoulder pauldrons with rank color
        const pauldronGeo = new THREE.SphereGeometry(0.22, 8, 8);
        const pauldronMat = new THREE.MeshStandardMaterial({ color: primaryColor, metalness: 0.7, emissive: primaryColor, emissiveIntensity: 0.1 });
        const leftPaul = new THREE.Mesh(pauldronGeo, pauldronMat);
        leftPaul.position.set(-0.65, 0.65, 0);
        leftPaul.scale.set(0.7, 0.4, 0.6);
        const rightPaul = new THREE.Mesh(pauldronGeo, pauldronMat);
        rightPaul.position.set(0.65, 0.65, 0);
        rightPaul.scale.set(0.7, 0.4, 0.6);
        character.add(leftPaul);
        character.add(rightPaul);
        
        // Glowing aura effect (particle system)
        const auraParticles = [];
        const auraCount = 12;
        for (let i = 0; i < auraCount; i++) {
            const particleGeo = new THREE.SphereGeometry(0.03, 6, 6);
            const particleMat = new THREE.MeshStandardMaterial({ color: primaryColor, emissive: primaryColor, emissiveIntensity: 0.5 });
            const particle = new THREE.Mesh(particleGeo, particleMat);
            particle.userData = {
                angle: (i / auraCount) * Math.PI * 2,
                radius: 0.9,
                speed: 0.5 + Math.random() * 0.5
            };
            character.add(particle);
            auraParticles.push(particle);
        }
        
        scene.add(character);
        
        // Position camera
        camera.position.set(1.6, 1.3, 2.8);
        camera.lookAt(0, 0.8, 0);
        
        // Animation
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.014;
            
            // Gentle floating animation
            character.position.y = Math.sin(time * 1.6) * 0.045;
            
            // Subtle idle sway
            character.rotation.y = Math.sin(time * 0.5) * 0.1;
            
            // Arm swing animation
            const armSwing = Math.sin(time * 2.0) * 0.25;
            leftArm.rotation.z = armSwing * 0.6;
            rightArm.rotation.z = -armSwing * 0.6;
            
            // Animate aura particles
            auraParticles.forEach((particle, idx) => {
                const data = particle.userData;
                data.angle += 0.02 * data.speed;
                particle.position.x = Math.cos(data.angle) * data.radius;
                particle.position.z = Math.sin(data.angle) * data.radius;
                particle.position.y = 0.6 + Math.sin(time * 2 + idx) * 0.1;
                const scale = 0.5 + Math.sin(time * 3 + idx) * 0.3;
                particle.scale.set(scale, scale, scale);
            });
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Handle resize
        const resizeObserver = new ResizeObserver(() => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
        resizeObserver.observe(container);
    }
    
    // Render staff cards
    function renderStaffCards() {
        const grid = document.getElementById('staff-grid');
        if (!grid) return;
        
        grid.innerHTML = '';
        
        for (const staff of staffMembers) {
            const card = document.createElement('div');
            card.className = 'staff-card fade-in';
            
            const modelDiv = document.createElement('div');
            modelDiv.className = 'model-container';
            modelDiv.id = `model-${staff.name.replace(/\s/g, '')}`;
            
            const infoDiv = document.createElement('div');
            infoDiv.className = 'staff-info';
            
            let rankClass = '';
            let rankDisplay = '';
            
            if (staff.rank === 'Founder') {
                rankClass = 'rank-badge-founder';
                rankDisplay = `${staff.rankIcon} FOUNDER`;
            } else if (staff.rank === 'Executive') {
                rankClass = 'rank-badge-executive';
                rankDisplay = `${staff.rankIcon} EXECUTIVE`;
            } else {
                rankClass = 'rank-badge-head';
                rankDisplay = `${staff.rankIcon} HEAD MANAGEMENT`;
            }
            
            infoDiv.innerHTML = `
                <div class="staff-name">${staff.name}</div>
                <div class="staff-rank ${rankClass}">${rankDisplay}</div>
                <div class="staff-description">${staff.description}</div>
            `;
            
            card.appendChild(modelDiv);
            card.appendChild(infoDiv);
            grid.appendChild(card);
            
            // Create custom 3D model
            setTimeout(() => {
                createCustomModel(modelDiv, staff);
            }, 100);
        }
    }
    
    renderStaffCards();
    
    // Fade-in observer
    const fadeElements = document.querySelectorAll('.fade-in');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('visible');
        });
    }, { threshold: 0.12 });
    fadeElements.forEach(el => observer.observe(el));
    
    // Theme Toggle
    const themeBtn = document.getElementById('themeToggleBtn');
    const sunSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
    const moonSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
    function setTheme(isLight){ 
        if(isLight){ document.body.classList.add('light-mode'); themeBtn.innerHTML = moonSvg; localStorage.setItem('theme','light'); } 
        else { document.body.classList.remove('light-mode'); themeBtn.innerHTML = sunSvg; localStorage.setItem('theme','dark'); }
    }
    setTheme(localStorage.getItem('theme') === 'light');
    themeBtn.addEventListener('click', () => setTheme(!document.body.classList.contains('light-mode')));
</script>

</body>
