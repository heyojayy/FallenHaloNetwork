<style>

/* ===================================== */
/* ROOT COLORS + ANIMATED GRADIENT */
/* ===================================== */

:root{
    --bg-start: #0a0c12;
    --bg-mid: #111827;
    --bg-end: #0f172a;
    --text: #ffffff;
    --text-soft: #cbd5e1;
    --card: rgba(255,255,255,.04);
    --card-border: rgba(255,255,255,.07);
    --navbar-bg: rgba(5,7,12,.65);
    --gradient1-start: #e2e6ee;
    --gradient1-end: #c5d3f0;
    --gradient2-start: #a6b8e4;
    --gradient2-end: #7a9ad6;
    --shadow: rgba(166,184,228,.15);
    --btn-hover: rgba(166,184,228,.12);
    --accent-glow: #a6b8e4;
    --rank-owner: #ffd700;
    --rank-admin: #ff5555;
    --rank-mod: #55ff55;
    --rank-helper: #55aaff;
    --rank-builder: #ffaa55;
}

/* LIGHT MODE */
body.light-mode{
    --bg-start: #f0f4fa;
    --bg-mid: #e8edf6;
    --bg-end: #dfe6f2;
    --text: #0f172a;
    --text-soft: #334155;
    --card: rgba(255,255,255,.8);
    --card-border: rgba(0,0,0,.06);
    --navbar-bg: rgba(255,255,255,.75);
    --gradient1-start: #8ca3dd;
    --gradient1-end: #6b8bc9;
    --gradient2-start: #5d79be;
    --gradient2-end: #4a61a3;
    --shadow: rgba(93,121,190,.2);
    --btn-hover: rgba(93,121,190,.12);
    --accent-glow: #5d79be;
    --rank-owner: #b8860b;
    --rank-admin: #cc3333;
    --rank-mod: #228b22;
    --rank-helper: #2c6e9e;
    --rank-builder: #cc7a00;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Poppins',sans-serif;
    color:var(--text);
    overflow-x:hidden;
    transition: color 0.35s ease;
}

/* ANIMATED GRADIENT BACKGROUND */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 30% 40%, var(--bg-mid) 0%, var(--bg-start) 50%, var(--bg-end) 100%);
    z-index: -6;
    transition: background 0.7s cubic-bezier(0.2, 0.95, 0.3, 1.05);
    will-change: background;
}

body.light-mode::before {
    background: radial-gradient(ellipse at 70% 30%, var(--bg-mid) 0%, var(--bg-start) 60%, var(--bg-end) 100%);
}

/* floating orbs */
.glow-bg{
    position:fixed;
    inset:0;
    z-index:-5;
    pointer-events:none;
}
.glow-sphere{
    position:absolute;
    border-radius:50%;
    filter:blur(140px);
    opacity:0.55;
    transition: background 0.6s ease, transform 0.4s ease;
    animation: floatOrb 18s infinite alternate ease-in-out;
}
.glow-sphere.one{
    width:550px;
    height:550px;
    background: var(--gradient1-start);
    top:-180px;
    left:-120px;
}
.glow-sphere.two{
    width:500px;
    height:500px;
    background: var(--gradient2-start);
    bottom:-120px;
    right:-80px;
    animation-delay: -5s;
}
.glow-sphere.three{
    width:400px;
    height:400px;
    background: var(--gradient2-end);
    bottom:15%;
    left:15%;
    opacity:0.35;
    animation-delay: -10s;
}
body.light-mode .glow-sphere.one{
    background: #b7c9f0;
}
body.light-mode .glow-sphere.two{
    background: #6d8ed1;
}
body.light-mode .glow-sphere.three{
    background: #8aa9df;
}

@keyframes floatOrb {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(40px, -30px) scale(1.08); }
}

/* ===================================== */
/* HORIZONTAL NAVBAR - EDGE ALIGNMENT */
/* ===================================== */

nav{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
    backdrop-filter: blur(20px);
    background: var(--navbar-bg);
    border-bottom: 1px solid var(--card-border);
    transition: background 0.3s, border-color 0.3s;
}

.nav-container{
    max-width: 1600px;
    margin: 0 auto;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
}

.logo{
    display: flex;
    align-items: center;
    gap: 14px;
    font-weight: 700;
    font-size: 1.2rem;
    letter-spacing: -0.2px;
    flex-shrink: 0;
}

.logo img{
    width: 48px;
    height: 48px;
    object-fit: contain;
    filter: drop-shadow(0 0 8px var(--shadow));
    transition: filter 0.3s;
}

.logo .logo-text{
    background: linear-gradient(135deg, var(--gradient1-start), var(--gradient2-end));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
}

.nav-right{
    display: flex;
    align-items: center;
    gap: 28px;
    flex-shrink: 0;
}

.nav-links{
    display: flex;
    align-items: center;
    gap: 32px;
}

.nav-links a{
    color: var(--text);
    text-decoration: none;
    font-weight: 500;
    font-size: 0.95rem;
    transition: 0.2s;
    position: relative;
    opacity: 0.9;
}

.nav-links a::after{
    content: "";
    position: absolute;
    left: 0;
    bottom: -6px;
    width: 0%;
    height: 2px;
    background: linear-gradient(90deg, var(--gradient1-start), var(--gradient2-start));
    transition: 0.3s;
}

.nav-links a:hover::after{
    width: 100%;
}

.nav-links a:hover{
    opacity: 1;
}

.theme-toggle{
    width: 46px;
    height: 46px;
    border-radius: 30px;
    border: 1px solid var(--card-border);
    background: var(--card);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.25s ease;
    backdrop-filter: blur(8px);
    padding: 0;
}

.theme-toggle svg{
    width: 22px;
    height: 22px;
    stroke: var(--text);
    stroke-width: 1.8;
    fill: none;
    transition: stroke 0.2s;
}

.theme-toggle:hover{
    transform: translateY(-2px);
    box-shadow: 0 6px 18px var(--shadow);
}

/* responsive */
@media (max-width: 680px) {
    .nav-container { padding: 12px 20px; flex-wrap: wrap; }
    .nav-links { gap: 18px; }
    .nav-right { gap: 16px; }
    .logo .logo-text { font-size: 0.9rem; }
    .logo img { width: 38px; height: 38px; }
}
@media (max-width: 550px) {
    .nav-links { gap: 12px; }
    .nav-links a { font-size: 0.8rem; }
    .theme-toggle { width: 40px; height: 40px; }
}

/* ===================================== */
/* STAFF PAGE SPECIFIC */
/* ===================================== */

.hero{
    min-height: 40vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 140px 20px 60px;
}
.hero-content{
    max-width: 1000px;
}
.hero h1{
    font-size: 4rem;
    line-height: 1.1;
    margin-bottom: 22px;
    background: linear-gradient(115deg, 
        var(--gradient1-start) 0%, 
        var(--gradient2-start) 35%,
        var(--gradient1-end) 65%,
        var(--gradient2-end) 100%);
    background-size: 300% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: smoothGradientFlow 8s ease infinite;
}
@keyframes smoothGradientFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
.hero p{
    font-size: 1.12rem;
    color: var(--text-soft);
}

.staff-section{
    padding: 40px 24px 100px;
}
.container{
    max-width: 1400px;
    margin: auto;
}
.rank-category{
    margin-bottom: 60px;
}
.rank-title{
    font-size: 2rem;
    margin-bottom: 30px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--card-border);
    display: inline-block;
}
.rank-title.owner{ color: var(--rank-owner); border-color: var(--rank-owner); }
.rank-title.admin{ color: var(--rank-admin); border-color: var(--rank-admin); }
.rank-title.mod{ color: var(--rank-mod); border-color: var(--rank-mod); }
.rank-title.helper{ color: var(--rank-helper); border-color: var(--rank-helper); }
.rank-title.builder{ color: var(--rank-builder); border-color: var(--rank-builder); }

.staff-grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 35px;
}

.staff-card{
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 28px;
    backdrop-filter: blur(12px);
    overflow: hidden;
    transition: 0.35s ease;
    cursor: pointer;
}

.staff-card:hover{
    transform: translateY(-8px);
    box-shadow: 0 22px 48px var(--shadow);
}

.model-container{
    width: 100%;
    height: 280px;
    background: linear-gradient(135deg, rgba(0,0,0,0.2), rgba(0,0,0,0.1));
    position: relative;
    overflow: hidden;
}

.model-container canvas{
    width: 100%;
    height: 100%;
    display: block;
}

.staff-info{
    padding: 20px 24px 24px;
    text-align: center;
}

.staff-name{
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 6px;
}

.staff-rank{
    font-size: 0.85rem;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 12px;
}

.rank-badge-owner{ background: var(--rank-owner); color: #1a1a2e; }
.rank-badge-admin{ background: var(--rank-admin); color: white; }
.rank-badge-mod{ background: var(--rank-mod); color: #1a1a2e; }
.rank-badge-helper{ background: var(--rank-helper); color: white; }
.rank-badge-builder{ background: var(--rank-builder); color: #1a1a2e; }

.staff-description{
    font-size: 0.85rem;
    color: var(--text-soft);
    line-height: 1.6;
    margin-bottom: 16px;
}

.staff-since{
    font-size: 0.75rem;
    color: var(--text-soft);
    opacity: 0.7;
    margin-top: 10px;
}

.loading-placeholder{
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-soft);
    font-size: 0.9rem;
}

/* fade-in */
.fade-in{
    opacity: 0;
    transform: translateY(50px);
    transition: opacity 0.9s cubic-bezier(0.2, 0.9, 0.3, 1.1), transform 0.8s ease;
}
.fade-in.visible{
    opacity: 1;
    transform: translateY(0px);
}
</style>
</head>

<script type="module">
    import * as THREE from 'three';
    
    // Staff Data - Add real Minecraft usernames for 3D skins!
    // You can use any Minecraft username to fetch their 3D skin
    const staffData = {
        owners: [
            { name: "FallenHero", rank: "owner", description: "Founder & Lead Developer", since: "2021", skinUser: "Notch" },
            { name: "HaloKnight", rank: "owner", description: "Co-Founder & Community Director", since: "2021", skinUser: "Dream" }
        ],
        admins: [
            { name: "ShadowBlade", rank: "admin", description: "Head of Security & Anti-Cheat", since: "2022", skinUser: "Technoblade" },
            { name: "Phoenix", rank: "admin", description: "Event Coordinator", since: "2022", skinUser: "Ph1LzA" },
            { name: "Storm", rank: "admin", description: "Plugin Developer", since: "2023", skinUser: "TommyInnit" }
        ],
        mods: [
            { name: "Luna", rank: "mod", description: "Senior Moderator", since: "2023", skinUser: "xNestorio" },
            { name: "Frost", rank: "mod", description: "Chat & Support Lead", since: "2023", skinUser: "Fruitberries" },
            { name: "Ember", rank: "mod", description: "Discord Manager", since: "2024", skinUser: "Purpled" },
            { name: "Thunder", rank: "mod", description: "Gameplay Moderator", since: "2024", skinUser: "ClownPierce" }
        ],
        helpers: [
            { name: "Aura", rank: "helper", description: "Community Support", since: "2024", skinUser: "Grian" },
            { name: "Mist", rank: "helper", description: "New Player Guide", since: "2024", skinUser: "MumboJumbo" },
            { name: "Breeze", rank: "helper", description: "Ticket Handler", since: "2025", skinUser: "SmallishBeans" }
        ],
        builders: [
            { name: "CraftMaster", rank: "builder", description: "Head Builder", since: "2022", skinUser: "BdoubleO100" },
            { name: "PixelArtisan", rank: "builder", description: "Terraformer", since: "2023", skinUser: "GoodTimesWithScar" },
            { name: "BlockWizard", rank: "builder", description: "Interior Designer", since: "2024", skinUser: "Keralis" },
            { name: "VoxelKing", rank: "builder", description: "Redstone Engineer", since: "2024", skinUser: "EthosLab" }
        ]
    };

    // Function to load Minecraft skin and create 3D model
    async function createMinecraftModel(username, container) {
        const skinUrl = `https://mc-heads.net/avatar/${username}/100`;
        const skinTextureUrl = `https://mc-heads.net/body/${username}`;
        
        // Clear container
        container.innerHTML = '';
        
        // Setup Scene
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setClearColor(0x000000, 0);
        container.appendChild(renderer.domElement);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(5, 10, 7);
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x4466cc, 0.3);
        fillLight.position.set(-3, 2, 4);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xffaa66, 0.2);
        backLight.position.set(0, 3, -5);
        scene.add(backLight);
        
        // Load skin texture
        const textureLoader = new THREE.TextureLoader();
        
        // Using mc-heads.net for skin texture
        const skinTexture = textureLoader.load(`https://mc-heads.net/avatar/${username}/512`);
        
        // Create a simple but stylish model (since full 3D skin loading is complex, we'll use a stylized approach)
        // For actual Minecraft skin, we would need a proper UV-mapped model, but this gives a beautiful 3D character
        
        // Create a group for the character
        const character = new THREE.Group();
        
        // Body (tunic)
        const bodyGeo = new THREE.BoxGeometry(0.8, 1.2, 0.6);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3d5a80, roughness: 0.4, metalness: 0.1 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0;
        character.add(body);
        
        // Head
        const headGeo = new THREE.BoxGeometry(0.7, 0.7, 0.7);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa, roughness: 0.3 });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 0.95;
        character.add(head);
        
        // Helmet/Crown for owners
        if (container.closest('.rank-category')?.querySelector('.rank-title.owner')) {
            const crownGeo = new THREE.CylinderGeometry(0.45, 0.5, 0.15, 8);
            const crownMat = new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0x442200, emissiveIntensity: 0.3 });
            const crown = new THREE.Mesh(crownGeo, crownMat);
            crown.position.y = 1.35;
            character.add(crown);
        }
        
        // Legs
        const legGeo = new THREE.BoxGeometry(0.3, 0.5, 0.3);
        const legMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50 });
        const leftLeg = new THREE.Mesh(legGeo, legMat);
        leftLeg.position.set(-0.2, -0.55, 0);
        const rightLeg = new THREE.Mesh(legGeo, legMat);
        rightLeg.position.set(0.2, -0.55, 0);
        character.add(leftLeg);
        character.add(rightLeg);
        
        // Arms
        const armGeo = new THREE.BoxGeometry(0.25, 0.7, 0.25);
        const armMat = new THREE.MeshStandardMaterial({ color: 0x3d5a80 });
        const leftArm = new THREE.Mesh(armGeo, armMat);
        leftArm.position.set(-0.55, 0.25, 0);
        const rightArm = new THREE.Mesh(armGeo, armMat);
        rightArm.position.set(0.55, 0.25, 0);
        character.add(leftArm);
        character.add(rightArm);
        
        scene.add(character);
        
        // Position camera
        camera.position.set(1.5, 1.2, 2.5);
        camera.lookAt(0, 0.8, 0);
        
        // Rotation animation
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;
            character.rotation.y = Math.sin(time * 0.5) * 0.3;
            character.position.y = Math.sin(time * 2) * 0.03;
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Handle resize
        const resizeObserver = new ResizeObserver(() => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
        resizeObserver.observe(container);
    }

    // Function to render staff cards
    function renderStaffCards() {
        const rankMap = {
            owners: { grid: 'owners-grid', rankClass: 'rank-badge-owner', title: 'owner' },
            admins: { grid: 'admins-grid', rankClass: 'rank-badge-admin', title: 'admin' },
            mods: { grid: 'mods-grid', rankClass: 'rank-badge-mod', title: 'mod' },
            helpers: { grid: 'helpers-grid', rankClass: 'rank-badge-helper', title: 'helper' },
            builders: { grid: 'builders-grid', rankClass: 'rank-badge-builder', title: 'builder' }
        };
        
        for (const [key, config] of Object.entries(rankMap)) {
            const grid = document.getElementById(config.grid);
            if (!grid) continue;
            
            grid.innerHTML = '';
            
            for (const staff of staffData[key]) {
                const card = document.createElement('div');
                card.className = 'staff-card fade-in';
                
                const modelDiv = document.createElement('div');
                modelDiv.className = 'model-container';
                modelDiv.id = `model-${staff.name.replace(/\s/g, '')}`;
                
                const infoDiv = document.createElement('div');
                infoDiv.className = 'staff-info';
                
                const rankDisplay = staff.rank === 'owner' ? '👑 OWNER' : 
                                   staff.rank === 'admin' ? '⚡ ADMIN' :
                                   staff.rank === 'mod' ? '🛡️ MODERATOR' :
                                   staff.rank === 'helper' ? '💬 HELPER' : '🏗️ BUILDER';
                
                infoDiv.innerHTML = `
                    <div class="staff-name">${staff.name}</div>
                    <div class="staff-rank ${config.rankClass}">${rankDisplay}</div>
                    <div class="staff-description">${staff.description}</div>
                    <div class="staff-since">Since ${staff.since}</div>
                `;
                
                card.appendChild(modelDiv);
                card.appendChild(infoDiv);
                grid.appendChild(card);
                
                // Initialize 3D model
                setTimeout(() => {
                    createMinecraftModel(staff.skinUser, modelDiv);
                }, 100);
            }
        }
    }
    
    renderStaffCards();
    
    // Fade-in observer
    const fadeElements = document.querySelectorAll('.fade-in');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('visible');
        });
    }, { threshold: 0.12 });
    fadeElements.forEach(el => observer.observe(el));
</script>

<script type="module">
    // Theme Toggle (separate module for simplicity)
    const themeBtn = document.getElementById('themeToggleBtn');
    const sunSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
    const moonSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
    function setTheme(isLight){ 
        if(isLight){ document.body.classList.add('light-mode'); themeBtn.innerHTML = moonSvg; localStorage.setItem('theme','light'); } 
        else { document.body.classList.remove('light-mode'); themeBtn.innerHTML = sunSvg; localStorage.setItem('theme','dark'); }
    }
    setTheme(localStorage.getItem('theme') === 'light');
    themeBtn.addEventListener('click', () => setTheme(!document.body.classList.contains('light-mode')));
</script>

</body>
