<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Staff - Fallen Halo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* GLOBAL */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#e6fffb,#f7fffe,#ffffff);
    color:#1f2a2a;
}

/* ========================= */
/* NAV (MATCH INDEX EXACTLY) */
/* ========================= */

nav{
    position:fixed;
    top:0;
    width:100%;
    z-index:999;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 7%;

    background:rgba(235,255,252,0.75);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(63,199,183,0.15);
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:700;
    color:#3fc7b7;
}

.logo img{
    width:42px;
    border-radius:12px;
}

/* NAV LINKS */
.nav-links a{
    margin-left:14px;
    text-decoration:none;
    color:#2b3b3a;

    padding:8px 12px;
    border-radius:12px;
    display:inline-block;

    transition:0.25s;
}

.nav-links a:hover{
    transform:scale(1.12);
    background:rgba(63,199,183,0.12);
    color:#3fc7b7;
    box-shadow:0 8px 20px rgba(63,199,183,0.15);
}

/* ========================= */
/* HEADER */
/* ========================= */

.header{
    text-align:center;
    padding:130px 7% 40px;
}

.header h1{
    font-size:52px;
    color:#3fc7b7;
}

/* ========================= */
/* STAFF GRID */
/* ========================= */

.staff-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
    padding:40px 7%;
}

/* ========================= */
/* STAFF CARD */
/* ========================= */

.card{
    background:rgba(63,199,183,0.08);
    border:1px solid rgba(63,199,183,0.2);

    padding:28px;
    border-radius:24px;

    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px) scale(1.05);
    box-shadow:0 18px 45px rgba(63,199,183,0.2);
}

.card img{
    width:90px;
    border-radius:18px;
    margin-bottom:10px;
}

/* ========================= */
/* RANK BADGES */
/* ========================= */

.rank{
    display:inline-block;
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
    margin-top:8px;
}

/* COLORS */
.owner{ background:#ffd36b; color:#4a3b00; }
.admin{ background:#9fe3ff; color:#00465a; }
.mod{ background:#d8b6ff; color:#2e005a; }
.helper{ background:#bfffd0; color:#004a1f; }

</style>
</head>

<body>

<!-- NAV (UPDATED WITH STORE BUTTON) -->
<nav>

    <div class="logo">
        <img src="https://mc-heads.net/avatar/Steve">
        Fallen Halo
    </div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="index.html#features">Features</a>
        <a href="index.html#gallery">Gallery</a>
        <a href="store.html">Store</a>
    </div>

</nav>

<!-- HEADER -->
<div class="header">
    <h1>Staff Team</h1>
</div>

<!-- STAFF -->
<div class="staff-grid">

    <div class="card">
        <img src="https://mc-heads.net/avatar/Notch">
        <h3>Notch</h3>
        <div class="rank owner">Owner</div>
    </div>

    <div class="card">
        <img src="https://mc-heads.net/avatar/Steve">
        <h3>Steve</h3>
        <div class="rank admin">Admin</div>
    </div>

    <div class="card">
        <img src="https://mc-heads.net/avatar/Alex">
        <h3>Alex</h3>
        <div class="rank mod">Moderator</div>
    </div>

    <div class="card">
        <img src="https://mc-heads.net/avatar/Herobrine">
        <h3>Herobrine</h3>
        <div class="rank helper">Helper</div>
    </div>

</div>

</body>
</html>
