<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Staff Team - Fallen Halo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* GLOBAL (MATCH INDEX) */
/* ========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#e6fffb,#f7fffe,#ffffff);
    color:#1f2a2a;
}

/* ========================= */
/* NAVBAR (SAME AS INDEX) */
/* ========================= */

nav{
    position:fixed;
    top:0;
    width:100%;
    z-index:999;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 7%;

    background:rgba(235,255,252,0.75);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(63,199,183,0.15);
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;

    font-size:22px;
    font-weight:700;
    color:#3fc7b7;
}

.logo img{
    width:42px;
    height:42px;
    border-radius:12px;
}

/* NAV LINKS */
.nav-links{
    display:flex;
    gap:22px;
}

.nav-links a{
    text-decoration:none;
    color:#2b3b3a;
    font-weight:500;
    transition:0.25s;
}

/* hover scale like index */
.nav-links a:hover{
    transform:scale(1.12);
    color:#3fc7b7;
}

/* ========================= */
/* HEADER */
/* ========================= */

.header{
    text-align:center;
    padding:120px 20px 40px;
}

.header h1{
    font-size:52px;
    color:#3fc7b7;
}

.header p{
    color:#666;
}

/* ========================= */
/* BACK LINK STYLE REMOVED (now nav handles it) */
/* ========================= */

/* ========================= */
/* STAFF GRID */
/* ========================= */

.staff-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:22px;
    padding:40px 7% 80px;
}

/* CARD */
.card{
    background:rgba(63,199,183,0.08);
    border:1px solid rgba(63,199,183,0.2);

    border-radius:26px;
    padding:30px;

    text-align:center;

    transition:0.35s ease;
}

.card:hover{
    transform:translateY(-10px) scale(1.04);
    box-shadow:0 20px 50px rgba(63,199,183,0.18);
}

.card img{
    width:90px;
    height:90px;
    border-radius:18px;
    margin-bottom:14px;
}

.card h3{
    margin-bottom:6px;
}

/* ROLE */
.role{
    display:inline-block;
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
    font-weight:600;
}

.owner{ background:#ffd36b; color:#4a3b00; }
.admin{ background:#a6e3ff; color:#00425a; }
.mod{ background:#d6b6ff; color:#2e005a; }

</style>
</head>

<body>

<!-- NAV -->
<nav>
    <div class="logo">
        <img src="https://mc-heads.net/avatar/Steve">
        Fallen Halo
    </div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="index.html#features">Features</a>
        <a href="index.html#gallery">Gallery</a>
        <a href="index.html#faq">FAQ</a>
    </div>
</nav>

<!-- HEADER -->
<div class="header">
    <h1>Staff Team</h1>
    <p>Meet the people behind Fallen Halo Network</p>
</div>

<!-- STAFF -->
<div class="staff-grid">

    <div class="card">
        <img src="https://mc-heads.net/avatar/Notch">
        <h3>Notch</h3>
        <div class="role owner">Owner</div>
    </div>

    <div class="card">
        <img src="https://mc-heads.net/avatar/Steve">
        <h3>Steve</h3>
        <div class="role admin">Admin</div>
    </div>

    <div class="card">
        <img src="https://mc-heads.net/avatar/Alex">
        <h3>Alex</h3>
        <div class="role mod">Moderator</div>
    </div>

</div>

</body>
</html>
