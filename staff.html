<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fallen Halo Network | Staff Team</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Three.js Library -->
<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
        }
    }
</script>

<style>

/* ===================================== */
/* ROOT COLORS + ANIMATED GRADIENT */
/* ===================================== */

:root{
    --bg-start: #0a0c12;
    --bg-mid: #111827;
    --bg-end: #0f172a;
    --text: #ffffff;
    --text-soft: #cbd5e1;
    --card: rgba(255,255,255,.04);
    --card-border: rgba(255,255,255,.07);
    --navbar-bg: rgba(5,7,12,.65);
    --gradient1-start: #e2e6ee;
    --gradient1-end: #c5d3f0;
    --gradient2-start: #a6b8e4;
    --gradient2-end: #7a9ad6;
    --shadow: rgba(166,184,228,.15);
    --btn-hover: rgba(166,184,228,.12);
    --accent-glow: #a6b8e4;
    --rank-founder: linear-gradient(135deg, #ffd700, #ffaa00);
    --rank-executive: linear-gradient(135deg, #ff5555, #cc3333);
    --rank-head: linear-gradient(135deg, #55ff55, #22aa22);
}

/* LIGHT MODE */
body.light-mode{
    --bg-start: #f0f4fa;
    --bg-mid: #e8edf6;
    --bg-end: #dfe6f2;
    --text: #0f172a;
    --text-soft: #334155;
    --card: rgba(255,255,255,.8);
    --card-border: rgba(0,0,0,.06);
    --navbar-bg: rgba(255,255,255,.75);
    --gradient1-start: #8ca3dd;
    --gradient1-end: #6b8bc9;
    --gradient2-start: #5d79be;
    --gradient2-end: #4a61a3;
    --shadow: rgba(93,121,190,.2);
    --btn-hover: rgba(93,121,190,.12);
    --accent-glow: #5d79be;
    --rank-founder: linear-gradient(135deg, #d4af37, #b8860b);
    --rank-executive: linear-gradient(135deg, #dc3545, #a71d2a);
    --rank-head: linear-gradient(135deg, #28a745, #1e7e34);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Poppins',sans-serif;
    color:var(--text);
    overflow-x:hidden;
    transition: color 0.35s ease;
}

/* ANIMATED GRADIENT BACKGROUND */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 30% 40%, var(--bg-mid) 0%, var(--bg-start) 50%, var(--bg-end) 100%);
    z-index: -6;
    transition: background 0.7s cubic-bezier(0.2, 0.95, 0.3, 1.05);
    will-change: background;
}

body.light-mode::before {
    background: radial-gradient(ellipse at 70% 30%, var(--bg-mid) 0%, var(--bg-start) 60%, var(--bg-end) 100%);
}

/* floating orbs */
.glow-bg{
    position:fixed;
    inset:0;
    z-index:-5;
    pointer-events:none;
}
.glow-sphere{
    position:absolute;
    border-radius:50%;
    filter:blur(140px);
    opacity:0.55;
    transition: background 0.6s ease, transform 0.4s ease;
    animation: floatOrb 18s infinite alternate ease-in-out;
}
.glow-sphere.one{
    width:550px;
    height:550px;
    background: var(--gradient1-start);
    top:-180px;
    left:-120px;
}
.glow-sphere.two{
    width:500px;
    height:500px;
    background: var(--gradient2-start);
    bottom:-120px;
    right:-80px;
    animation-delay: -5s;
}
.glow-sphere.three{
    width:400px;
    height:400px;
    background: var(--gradient2-end);
    bottom:15%;
    left:15%;
    opacity:0.35;
    animation-delay: -10s;
}
body.light-mode .glow-sphere.one{
    background: #b7c9f0;
}
body.light-mode .glow-sphere.two{
    background: #6d8ed1;
}
body.light-mode .glow-sphere.three{
    background: #8aa9df;
}

@keyframes floatOrb {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(40px, -30px) scale(1.08); }
}

/* ===================================== */
/* HORIZONTAL NAVBAR - EDGE ALIGNMENT */
/* ===================================== */

nav{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;
    backdrop-filter: blur(20px);
    background: var(--navbar-bg);
    border-bottom: 1px solid var(--card-border);
    transition: background 0.3s, border-color 0.3s;
}

.nav-container{
    max-width: 1600px;
    margin: 0 auto;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
}

.logo{
    display: flex;
    align-items: center;
    gap: 14px;
    font-weight: 700;
    font-size: 1.2rem;
    letter-spacing: -0.2px;
    flex-shrink: 0;
}

.logo img{
    width: 48px;
    height: 48px;
    object-fit: contain;
    filter: drop-shadow(0 0 8px var(--shadow));
    transition: filter 0.3s;
}

.logo .logo-text{
    background: linear-gradient(135deg, var(--gradient1-start), var(--gradient2-end));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 700;
}

.nav-right{
    display: flex;
    align-items: center;
    gap: 28px;
    flex-shrink: 0;
}

.nav-links{
    display: flex;
    align-items: center;
    gap: 32px;
}

.nav-links a{
    color: var(--text);
    text-decoration: none;
    font-weight: 500;
    font-size: 0.95rem;
    transition: 0.2s;
    position: relative;
    opacity: 0.9;
}

.nav-links a::after{
    content: "";
    position: absolute;
    left: 0;
    bottom: -6px;
    width: 0%;
    height: 2px;
    background: linear-gradient(90deg, var(--gradient1-start), var(--gradient2-start));
    transition: 0.3s;
}

.nav-links a:hover::after{
    width: 100%;
}

.nav-links a:hover{
    opacity: 1;
}

.theme-toggle{
    width: 46px;
    height: 46px;
    border-radius: 30px;
    border: 1px solid var(--card-border);
    background: var(--card);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.25s ease;
    backdrop-filter: blur(8px);
    padding: 0;
}

.theme-toggle svg{
    width: 22px;
    height: 22px;
    stroke: var(--text);
    stroke-width: 1.8;
    fill: none;
    transition: stroke 0.2s;
}

.theme-toggle:hover{
    transform: translateY(-2px);
    box-shadow: 0 6px 18px var(--shadow);
}

/* responsive */
@media (max-width: 680px) {
    .nav-container { padding: 12px 20px; flex-wrap: wrap; }
    .nav-links { gap: 18px; }
    .nav-right { gap: 16px; }
    .logo .logo-text { font-size: 0.9rem; }
    .logo img { width: 38px; height: 38px; }
}
@media (max-width: 550px) {
    .nav-links { gap: 12px; }
    .nav-links a { font-size: 0.8rem; }
    .theme-toggle { width: 40px; height: 40px; }
}

/* ===================================== */
/* STAFF PAGE SPECIFIC */
/* ===================================== */

.hero{
    min-height: 40vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 140px 20px 60px;
}
.hero-content{
    max-width: 1000px;
}
.hero h1{
    font-size: 4rem;
    line-height: 1.1;
    margin-bottom: 22px;
    background: linear-gradient(115deg, 
        var(--gradient1-start) 0%, 
        var(--gradient2-start) 35%,
        var(--gradient1-end) 65%,
        var(--gradient2-end) 100%);
    background-size: 300% auto;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: smoothGradientFlow 8s ease infinite;
}
@keyframes smoothGradientFlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
.hero p{
    font-size: 1.12rem;
    color: var(--text-soft);
}

.staff-section{
    padding: 40px 24px 100px;
}
.container{
    max-width: 1400px;
    margin: auto;
}

.staff-grid{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 40px;
    justify-items: center;
    align-items: start;
}

.staff-card{
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 32px;
    backdrop-filter: blur(12px);
    overflow: hidden;
    transition: 0.35s ease;
    width: 100%;
    max-width: 360px;
    text-align: center;
}

.staff-card:hover{
    transform: translateY(-10px);
    box-shadow: 0 25px 50px var(--shadow);
}

/* Head/Bubble container */
.head-container{
    padding: 35px 0 20px 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.05), transparent);
}

.head-bubble{
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: var(--card);
    border: 2px solid var(--card-border);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: 0.3s ease;
    box-shadow: 0 10px 30px var(--shadow);
}

.head-bubble canvas{
    width: 140px;
    height: 140px;
    border-radius: 50%;
    display: block;
}

/* Rank glow effects */
.staff-card[data-rank="Founder"] .head-bubble{
    box-shadow: 0 0 30px rgba(255,215,0,0.4);
    border-color: #ffd700;
}

.staff-card[data-rank="Executive"] .head-bubble{
    box-shadow: 0 0 30px rgba(255,85,85,0.4);
    border-color: #ff5555;
}

.staff-card[data-rank="Head Management"] .head-bubble{
    box-shadow: 0 0 30px rgba(85,255,85,0.4);
    border-color: #55ff55;
}

.staff-info{
    padding: 20px 24px 32px;
    text-align: center;
}

.staff-name{
    font-size: 1.5rem;
    font-weight: 800;
    margin-bottom: 8px;
    letter-spacing: -0.3px;
}

.staff-rank{
    font-size: 0.8rem;
    font-weight: 700;
    padding: 5px 14px;
    border-radius: 30px;
    display: inline-block;
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.rank-badge-founder{
    background: var(--rank-founder);
    color: #1a1a2e;
}
.rank-badge-executive{
    background: var(--rank-executive);
    color: white;
}
.rank-badge-head{
    background: var(--rank-head);
    color: #1a1a2e;
}

.staff-description{
    font-size: 0.85rem;
    color: var(--text-soft);
    line-height: 1.6;
}

/* fade-in */
.fade-in{
    opacity: 0;
    transform: translateY(50px);
    transition: opacity 0.9s cubic-bezier(0.2, 0.9, 0.3, 1.1), transform 0.8s ease;
}
.fade-in.visible{
    opacity: 1;
    transform: translateY(0px);
}

/* footer */
.cool-footer{
    margin-top: 0;
    background: rgba(0,0,0,0.2);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--card-border);
    padding: 2rem 2rem 1.5rem;
}
.footer-inner{
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    gap: 30px;
}
.footer-brand h3{
    font-size: 1.5rem;
    background: linear-gradient(135deg, var(--gradient1-start), var(--gradient2-start));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
}
.footer-brand p{
    color: var(--text-soft);
}
.footer-bottom{
    text-align: center;
    margin-top: 0;
    padding-top: 0;
    border-top: none;
    color: var(--text-soft);
}
</style>
</head>
<body>

<div class="glow-bg">
    <div class="glow-sphere one"></div>
    <div class="glow-sphere two"></div>
    <div class="glow-sphere three"></div>
</div>

<!-- NAVBAR -->
<nav>
    <div class="nav-container">
        <div class="logo">
            <img src="logo.png" alt="Fallen Halo Logo">
            <span class="logo-text">FALLEN HALO</span>
        </div>
        <div class="nav-right">
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="staff.html">Staff</a>
            </div>
            <button class="theme-toggle" id="themeToggleBtn">
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
            </button>
        </div>
    </div>
</nav>

<main>
    <section class="hero fade-in visible">
        <div class="hero-content">
            <h1>Leadership Team</h1>
            <p>The dedicated individuals guiding Fallen Halo Network to greatness.</p>
        </div>
    </section>

    <section class="staff-section fade-in">
        <div class="container">
            <div class="staff-grid" id="staff-grid"></div>
        </div>
    </section>
</main>

<footer class="cool-footer fade-in">
    <div class="footer-inner">
        <div class="footer-brand">
            <h3>FALLEN HALO NETWORK</h3>
            <p>Led by passion, driven by excellence.</p>
        </div>
        <div class="footer-bottom">© 2026 Fallen Halo Network — Esteemed Leadership Team</div>
    </div>
</footer>

<script type="module">
    import * as THREE from 'three';
    
    // Staff Data with custom colors for each head
    const staffMembers = [
        { 
            name: "Ange1XDem0n", 
            rank: "Founder", 
            description: "Creator & Visionary behind Fallen Halo Network. Leading the server with passion and dedication since day one.",
            headColor: 0xffd700,
            eyeColor: 0xffaa00,
            accentColor: 0xff6600
        },
        { 
            name: "its_apex", 
            rank: "Executive", 
            description: "Executive Director managing operations, community growth, and strategic partnerships.",
            headColor: 0xff4444,
            eyeColor: 0xff8888,
            accentColor: 0xcc3333
        },
        { 
            name: "abwyss", 
            rank: "Head Management", 
            description: "Head of Management overseeing staff, player relations, and server quality assurance.",
            headColor: 0x44ff44,
            eyeColor: 0x88ff88,
            accentColor: 0x33cc33
        }
    ];

    // Create a simple Minecraft-style head
    function createMinecraftHead(container, staff, rank) {
        container.innerHTML = '';
        
        // Setup Scene
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        const size = Math.min(container.clientWidth, container.clientHeight);
        renderer.setSize(size, size);
        renderer.setClearColor(0x000000, 0);
        container.appendChild(renderer.domElement);
        
        // Simple lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(3, 5, 4);
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x88aaff, 0.5);
        fillLight.position.set(-2, 2, 3);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xffaa66, 0.3);
        backLight.position.set(0, 1, -3);
        scene.add(backLight);
        
        // Create head group
        const headGroup = new THREE.Group();
        
        // Head cube (Minecraft style)
        const headGeo = new THREE.BoxGeometry(0.9, 0.9, 0.9);
        const headMat = new THREE.MeshStandardMaterial({ color: staff.headColor, roughness: 0.2, metalness: 0.1 });
        const head = new THREE.Mesh(headGeo, headMat);
        headGroup.add(head);
        
        // Eyes
        const eyeGeo = new THREE.BoxGeometry(0.2, 0.2, 0.1);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.3 });
        const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
        leftEye.position.set(-0.25, 0.2, 0.46);
        const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
        rightEye.position.set(0.25, 0.2, 0.46);
        headGroup.add(leftEye);
        headGroup.add(rightEye);
        
        // Pupils
        const pupilGeo = new THREE.BoxGeometry(0.1, 0.1, 0.05);
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const leftPupil = new THREE.Mesh(pupilGeo, pupilMat);
        leftPupil.position.set(-0.25, 0.18, 0.5);
        const rightPupil = new THREE.Mesh(pupilGeo, pupilMat);
        rightPupil.position.set(0.25, 0.18, 0.5);
        headGroup.add(leftPupil);
        headGroup.add(rightPupil);
        
        // Mouth (simple smile)
        const mouthGeo = new THREE.BoxGeometry(0.3, 0.08, 0.1);
        const mouthMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        const mouth = new THREE.Mesh(mouthGeo, mouthMat);
        mouth.position.set(0, -0.1, 0.46);
        headGroup.add(mouth);
        
        // Rank-specific accessory
        if (rank === "Founder") {
            // Crown
            const crownBase = new THREE.CylinderGeometry(0.55, 0.6, 0.2, 8);
            const crownMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.9, emissive: 0xffaa00, emissiveIntensity: 0.2 });
            const crown = new THREE.Mesh(crownBase, crownMat);
            crown.position.y = 0.55;
            headGroup.add(crown);
            
            // Crown spikes
            for (let i = 0; i < 5; i++) {
                const angle = (i / 5) * Math.PI * 2;
                const spikeGeo = new THREE.ConeGeometry(0.08, 0.22, 6);
                const spike = new THREE.Mesh(spikeGeo, crownMat);
                spike.position.set(Math.cos(angle) * 0.56, 0.66, Math.sin(angle) * 0.56);
                headGroup.add(spike);
            }
        } else if (rank === "Executive") {
            // Helmet visor
            const visorGeo = new THREE.BoxGeometry(0.65, 0.15, 0.2);
            const visorMat = new THREE.MeshStandardMaterial({ color: 0xcc3333, metalness: 0.8 });
            const visor = new THREE.Mesh(visorGeo, visorMat);
            visor.position.set(0, 0.45, 0.46);
            headGroup.add(visor);
        } else if (rank === "Head Management") {
            // Head antenna
            const antennaGeo = new THREE.CylinderGeometry(0.05, 0.08, 0.3, 6);
            const antennaMat = new THREE.MeshStandardMaterial({ color: 0x33cc33, metalness: 0.6 });
            const antenna = new THREE.Mesh(antennaGeo, antennaMat);
            antenna.position.set(0, 0.55, 0);
            headGroup.add(antenna);
            
            // Antenna ball
            const ballGeo = new THREE.SphereGeometry(0.08, 8, 8);
            const ballMat = new THREE.MeshStandardMaterial({ color: 0x55ff55, emissive: 0x55ff55, emissiveIntensity: 0.2 });
            const ball = new THREE.Mesh(ballGeo, ballMat);
            ball.position.set(0, 0.72, 0);
            headGroup.add(ball);
        }
        
        scene.add(headGroup);
        
        // Position camera
        camera.position.set(0, 0.2, 1.8);
        camera.lookAt(0, 0.2, 0);
        
        // Simple rotation animation (very subtle)
        let time = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            time += 0.005;
            // Very subtle gentle bob
            headGroup.position.y = Math.sin(time) * 0.02;
            headGroup.rotation.y = Math.sin(time * 0.5) * 0.1;
            renderer.render(scene, camera);
        }
        animate();
        
        // Handle resize to maintain square aspect ratio
        const resizeObserver = new ResizeObserver(() => {
            const newSize = Math.min(container.clientWidth, container.clientHeight);
            camera.aspect = 1;
            camera.updateProjectionMatrix();
            renderer.setSize(newSize, newSize);
        });
        resizeObserver.observe(container);
    }
    
    // Render staff cards
    function renderStaffCards() {
        const grid = document.getElementById('staff-grid');
        if (!grid) return;
        
        grid.innerHTML = '';
        
        for (const staff of staffMembers) {
            const card = document.createElement('div');
            card.className = 'staff-card fade-in';
            card.setAttribute('data-rank', staff.rank);
            
            // Head bubble container
            const headContainer = document.createElement('div');
            headContainer.className = 'head-container';
            
            const bubble = document.createElement('div');
            bubble.className = 'head-bubble';
            
            const canvasContainer = document.createElement('div');
            canvasContainer.style.width = '140px';
            canvasContainer.style.height = '140px';
            canvasContainer.style.borderRadius = '50%';
            canvasContainer.style.overflow = 'hidden';
            
            bubble.appendChild(canvasContainer);
            headContainer.appendChild(bubble);
            
            // Info section
            const infoDiv = document.createElement('div');
            infoDiv.className = 'staff-info';
            
            let rankClass = '';
            let rankDisplay = '';
            
            if (staff.rank === 'Founder') {
                rankClass = 'rank-badge-founder';
                rankDisplay = `👑 FOUNDER`;
            } else if (staff.rank === 'Executive') {
                rankClass = 'rank-badge-executive';
                rankDisplay = `⚡ EXECUTIVE`;
            } else {
                rankClass = 'rank-badge-head';
                rankDisplay = `📋 HEAD MANAGEMENT`;
            }
            
            infoDiv.innerHTML = `
                <div class="staff-name">${staff.name}</div>
                <div class="staff-rank ${rankClass}">${rankDisplay}</div>
                <div class="staff-description">${staff.description}</div>
            `;
            
            card.appendChild(headContainer);
            card.appendChild(infoDiv);
            grid.appendChild(card);
            
            // Create 3D head inside canvas container
            setTimeout(() => {
                createMinecraftHead(canvasContainer, staff, staff.rank);
            }, 100);
        }
    }
    
    renderStaffCards();
    
    // Fade-in observer
    const fadeElements = document.querySelectorAll('.fade-in');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) entry.target.classList.add('visible');
        });
    }, { threshold: 0.12 });
    fadeElements.forEach(el => observer.observe(el));
    
    // Theme Toggle
    const themeBtn = document.getElementById('themeToggleBtn');
    const sunSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
    const moonSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;
    function setTheme(isLight){ 
        if(isLight){ document.body.classList.add('light-mode'); themeBtn.innerHTML = moonSvg; localStorage.setItem('theme','light'); } 
        else { document.body.classList.remove('light-mode'); themeBtn.innerHTML = sunSvg; localStorage.setItem('theme','dark'); }
    }
    setTheme(localStorage.getItem('theme') === 'light');
    themeBtn.addEventListener('click', () => setTheme(!document.body.classList.contains('light-mode')));
</script>
