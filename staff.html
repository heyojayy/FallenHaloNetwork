<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Staff - Fallen Halo</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    scroll-behavior:smooth;
}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#e6fffb,#f7fffe,#ffffff);
    color:#1f2a2a;
}

/* NAV SAME STYLE */
nav{
    position:fixed;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 7%;
    background:rgba(235,255,252,0.75);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(63,199,183,0.15);
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:700;
    color:#3fc7b7;
}

.logo img{
    width:42px;
    height:42px;
    border-radius:12px;
}

.nav-links a{
    margin-left:20px;
    text-decoration:none;
    color:#2b3b3a;
}

.header{
    text-align:center;
    padding:120px 20px 40px;
}

.header h1{
    color:#3fc7b7;
    font-size:50px;
}

.staff-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:20px;
    padding:40px 7%;
}

.card{
    background:rgba(63,199,183,0.08);
    border:1px solid rgba(63,199,183,0.2);
    padding:30px;
    border-radius:24px;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.card img{
    width:90px;
    border-radius:18px;
}

.role{
    margin-top:10px;
    display:inline-block;
    padding:6px 12px;
    border-radius:999px;
    background:#3fc7b7;
    color:white;
}

</style>
</head>

<body>

<nav>
    <div class="logo">
        <img src="https://mc-heads.net/avatar/Steve">
        Fallen Halo
    </div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="index.html#features">Features</a>
        <a href="index.html#gallery">Gallery</a>
        <a href="index.html#faq">FAQ</a>
    </div>
</nav>

<div class="header">
    <h1>Staff Team</h1>
</div>

<div class="staff-grid">

    <div class="card">
        <img src="https://mc-heads.net/avatar/Notch">
        <h3>Notch</h3>
        <div class="role">Owner</div>
    </div>

    <div class="card">
        <img src="https://mc-heads.net/avatar/Steve">
        <h3>Steve</h3>
        <div class="role">Admin</div>
    </div>

</div>

</body>
</html>
